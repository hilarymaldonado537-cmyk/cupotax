<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- ============================================================
    SECCIÓN 1: METADATOS Y CONFIGURACIÓN
    - viewport: mobile-first (se ajusta a cualquier pantalla)
    - title: CupoTax - Iniciar Sesión
    - charset: UTF-8 para caracteres especiales
    - Thymeleaf para integración con Spring Boot
    ============================================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CupoTax - Iniciar Sesión</title>

    <!-- ============================================================
    SECCIÓN 2: FUENTES Y BIBLIOTECAS EXTERNAS
    - Inter: fuente principal (moderna y legible)
    - Font Awesome 6: íconos
    - SweetAlert2: alertas y modales bonitos
    ============================================================ -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- ============================================================
    SECCIÓN 3: SONIDO DE CAMPANITA (para login exitoso)
    ============================================================ -->
    <audio id="campanita" preload="auto" style="display:none;">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <!-- ============================================================
    SECCIÓN 4: FIREBASE SDKs
    - Firebase App: inicialización
    - Firebase Auth: autenticación de usuarios
    - Firebase Database: Realtime Database para datos en vivo
    ============================================================ -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <!-- ============================================================
    SECCIÓN 5: ESTILOS CSS COMPLETOS
    ============================================================ -->
    <style>
        /* ==========================================================
           SUB-SECCIÓN 5.1: RESET Y VARIABLES CSS
           - Reset universal
           - 5 temas visuales: Fire, Glass, Neon, Crimson, Light
           ========================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.style-fire {
            --bg-gradient-start: #0A0A0A;
            --bg-gradient-end: #1E1E1E;
            --glass-bg: rgba(30, 30, 30, 0.85);
            --glass-border: rgba(255, 106, 42, 0.3);
            --navbar-bg: rgba(10, 10, 10, 0.9);
            --text-primary: #FFFFFF;
            --text-secondary: #B3B3B3;
            --accent: #FF6A2A;
            --accent-neon: #FF8C42;
            --accent-glow: 0 0 15px rgba(255, 106, 42, 0.4);
            --card-bg: rgba(30, 30, 30, 0.85);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body.style-glass {
            --bg-gradient-start: #0B1220;
            --bg-gradient-end: #0A2540;
            --glass-bg: rgba(22, 38, 58, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --navbar-bg: rgba(16, 26, 43, 0.6);
            --text-primary: #FFFFFF;
            --text-secondary: #A8B2D1;
            --accent: #3A86FF;
            --accent-neon: #4FACFE;
            --accent-glow: 0 0 15px rgba(58, 134, 255, 0.3);
            --card-bg: rgba(22, 38, 58, 0.55);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body.style-neon {
            --bg-gradient-start: #0B0B12;
            --bg-gradient-end: #1A1D2E;
            --glass-bg: rgba(26, 29, 46, 0.7);
            --glass-border: rgba(255, 76, 205, 0.3);
            --navbar-bg: rgba(16, 18, 30, 0.8);
            --text-primary: #FFFFFF;
            --text-secondary: #A0A3BD;
            --accent: #FF4ECD;
            --accent-neon: #9D4EDD;
            --accent-glow: 0 0 15px rgba(255, 76, 205, 0.4);
            --card-bg: rgba(26, 29, 46, 0.7);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body.style-crimson {
            --bg-gradient-start: #1A0A0A;
            --bg-gradient-end: #2D1515;
            --glass-bg: rgba(45, 21, 21, 0.55);
            --glass-border: rgba(255, 100, 100, 0.15);
            --navbar-bg: rgba(26, 14, 14, 0.9);
            --text-primary: #FFFFFF;
            --text-secondary: #D1A8A8;
            --accent: #E63946;
            --accent-neon: #FF6B6B;
            --accent-glow: 0 0 15px rgba(230, 57, 70, 0.4);
            --card-bg: rgba(45, 21, 21, 0.55);
            --input-bg: rgba(255, 255, 255, 0.08);
        }

        body.style-crimson::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(230, 57, 70, 0.12), rgba(255, 100, 100, 0.05), transparent);
            pointer-events: none;
            z-index: -2;
        }

        body.style-crimson .btn-login {
            background: linear-gradient(135deg, #E63946, #FF6B6B);
        }

        body.style-crimson .forgot-link a,
        body.style-crimson .register-link a,
        body.style-crimson .back-link a {
            color: #E63946;
        }

        body.light-mode {
            --bg-gradient-start: #F5F5F7;
            --bg-gradient-end: #FFFFFF;
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(0, 0, 0, 0.1);
            --navbar-bg: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #555555;
            --accent: #FF6A2A;
            --accent-neon: #FF8C42;
            --accent-glow: 0 0 10px rgba(255, 106, 42, 0.2);
            --card-bg: #FFFFFF;
            --input-bg: #F5F5F5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.2: FONDO CON IMAGEN
           ========================================================== */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/pBSfBsYF/Whats-App-Image-2026-04-28-at-12-20-21-AM.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.25;
            z-index: -2;
        }

        body.light-mode::before {
            opacity: 0.6;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.3: CONTENEDOR PRINCIPAL
           ========================================================== */
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            margin: 2rem;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            padding: 2rem;
            transition: all 0.3s;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.4: LOGO Y TÍTULO
           ========================================================== */
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo span {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 2px;
        }

        .login-title {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-title h2 {
            color: var(--accent);
            font-size: 1.5rem;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.5: FORMULARIO
           ========================================================== */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            color: var(--accent);
            font-size: 0.75rem;
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* ==========================================================
           SUB-SECCIÓN 5.6: BOTONES
           ========================================================== */
        .btn-login {
            background: linear-gradient(135deg, var(--accent), var(--accent-neon));
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            color: #000;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: var(--accent-glow);
        }

        /* ==========================================================
           SUB-SECCIÓN 5.7: ENLACES
           ========================================================== */
        .forgot-link {
            text-align: right;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .forgot-link a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .forgot-link a:hover {
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .register-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            text-align: center;
            margin-top: 1rem;
        }

        .back-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.8: SPINNER DE CARGA
           ========================================================== */
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ==========================================================
           SUB-SECCIÓN 5.9: PANEL DE AJUSTES
           ========================================================== */
        .settings-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            transition: all 0.3s;
        }

        .settings-toggle:hover {
            transform: scale(1.1);
            box-shadow: var(--accent-glow);
        }

        .settings-panel {
            position: fixed;
            bottom: 90px;
            right: 24px;
            width: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--accent);
            padding: 1rem;
            z-index: 10000;
            display: none;
        }

        .settings-panel.open {
            display: block !important;
        }

        .settings-panel h4 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .theme-card {
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            text-align: center;
        }

        .theme-card:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .theme-card.active {
            background: var(--accent);
            color: #000;
        }

        .btn-reset {
            width: 100%;
            padding: 0.5rem;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 30px;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .btn-reset:hover {
            background: var(--accent);
            color: #000;
        }

        /* ==========================================================
           SUB-SECCIÓN 5.10: RESPONSIVE
           ========================================================== */
        @media (max-width: 480px) {
            body {
                padding: 0.5rem;
            }

            .login-container {
                padding: 0.5rem;
                margin: 0.5rem;
            }

            .login-card {
                padding: 1.5rem;
                border-radius: 20px;
            }

            .logo h1 {
                font-size: 1.6rem;
            }

            .login-title h2 {
                font-size: 1.2rem;
            }

            .form-group input {
                padding: 0.7rem;
                font-size: 0.95rem;
            }

            .btn-login {
                padding: 0.7rem;
                font-size: 0.95rem;
            }

            .settings-panel {
                width: 90%;
                right: 5%;
                bottom: 80px;
            }

            .settings-toggle {
                bottom: 20px;
                right: 20px;
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }

        @media (max-width: 360px) {
            .login-card {
                padding: 1rem;
            }

            .logo h1 {
                font-size: 1.3rem;
            }

            .login-title h2 {
                font-size: 1rem;
            }

            .form-group input {
                padding: 0.6rem;
                font-size: 0.85rem;
            }

            .btn-login {
                padding: 0.6rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
    SECCIÓN 6: AUDIO DE CAMPANITA (para login exitoso)
    ============================================================ -->
    <audio id="campanita" preload="auto" style="display:none;">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <!-- ============================================================
    SECCIÓN 7: CONTENEDOR PRINCIPAL
    ============================================================ -->
    <div class="login-container">
        <div class="login-card">

            <!-- ==========================================================
            SUB-SECCIÓN 7.1: LOGO Y TÍTULO
            ========================================================== -->
            <div class="logo">
                <h1>CupoTax</h1>
                <span>TRANSPORTE INTELIGENTE</span>
            </div>

            <div class="login-title">
                <h2>Iniciar Sesión</h2>
            </div>

            <!-- ==========================================================
            SUB-SECCIÓN 7.2: FORMULARIO DE LOGIN
            ========================================================== -->
            <form id="loginForm" onsubmit="loginFirebase(event)">

                <!-- Campo: Usuario o Correo -->
                <div class="form-group">
                    <label>USUARIO O CORREO</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario o email" required>
                </div>

                <!-- Campo: Contraseña -->
                <div class="form-group">
                    <label>CONTRASEÑA</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <!-- Enlace: Olvidaste tu contraseña -->
                <div class="forgot-link">
                    <a onclick="abrirRecuperacion()">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Botón: Ingresar -->
                <button type="submit" class="btn-login" id="btnLogin">INGRESAR</button>

            </form>

            <!-- ==========================================================
            SUB-SECCIÓN 7.3: ENLACES ADICIONALES
            ========================================================== -->
            <div class="register-link">
                ¿No tienes cuenta? <a onclick="navegarA('register')">Regístrate aquí</a>
            </div>

            <div class="back-link">
                <a onclick="navegarA('')">← Volver al inicio</a>
            </div>

        </div>
    </div>

    <!-- ============================================================
    SECCIÓN 8: PANEL DE AJUSTES (TEMAS)
    ============================================================ -->
    <div class="settings-toggle" onclick="toggleSettingsPanel()">
        <i class="fas fa-palette"></i>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <h4>🎨 Personalizar</h4>
        <div class="theme-card active" onclick="setEstilo('fire')" id="cardFire">🔥 Naranja Fuego</div>
        <div class="theme-card" onclick="setEstilo('glass')" id="cardGlass">🌀 Glass Azul</div>
        <div class="theme-card" onclick="setEstilo('neon')" id="cardNeon">🎨 Neon Glow</div>
        <div class="theme-card" onclick="setEstilo('crimson')" id="cardCrimson">🔴 Crimson Glass</div>
        <div class="theme-card" onclick="toggleLightMode()">☀️ Claro / Oscuro</div>
        <button class="btn-reset" onclick="resetearEstilos()">Restaurar</button>
    </div>

    <!-- ============================================================
    SECCIÓN 9: JAVASCRIPT - TODA LA LÓGICA (CORREGIDA - TODOS LOS ROLES)
    ============================================================ -->
    <script>
        // ==========================================================
        // 🔥 SECCIÓN 9.1: CONFIGURACIÓN DE FIREBASE
        // ==========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAfucjkHq7mhA29hu_swDnp38DyTP8tqdA",
            authDomain: "cupotax.firebaseapp.com",
            databaseURL: "https://cupotax-default-rtdb.firebaseio.com",
            projectId: "cupotax",
            storageBucket: "cupotax.firebasestorage.app",
            messagingSenderId: "146730589510",
            appId: "1:146730589510:web:3601a7f2b9093826a81947",
            measurementId: "G-FG3LJLTMZX"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const API_URL = '';

        // ==========================================================
        // 📋 SECCIÓN 9.2: DATOS DE PRESTATARIAS CON LOGOS
        // ==========================================================
        const PRESTATARIAS = {
            sincotavecop: {
                nombre: 'SINCOTAVECOP',
                logo: 'SINCOTAVECOP.png',
                color: '#3B82F6'
            },
            la_union: {
                nombre: 'LA UNION',
                logo: 'LAUNION.png',
                color: '#10B981'
            },
            taxi_25: {
                nombre: 'EXPRESO TAXI 25 S.A',
                logo: 'TAXI25.png',
                color: '#06B6D4'
            },
            urraca: {
                nombre: 'COOPERATIVA URRACA R.L.',
                logo: 'URRACA.png',
                color: '#22C55E'
            },
            chiriqui_grande: {
                nombre: 'COOPERATIVA CHIRIQUI GRANDE',
                logo: 'CHIRIQUIGRANDE.png',
                color: '#4ADE80'
            },
            tranceibosa: {
                nombre: 'TRANCEIBOSA',
                logo: 'TRANCEIBOSA.png',
                color: '#14B8A6'
            },
            selectivo_bocas: {
                nombre: 'SELECTIVO BOCAS S.A.',
                logo: 'SELECTIVOBOCAS.png',
                color: '#84CC16'
            }
        };
        const LOGO_BASE_PATH = 'static/';

        // ==========================================================
        // 📱 SECCIÓN 9.3: FUNCIONES DE NAVEGACIÓN
        // ==========================================================
        function navegarA(pagina) {
            if (pagina === '') window.location.href = API_URL + '/';
            else if (pagina === 'register') window.location.href = API_URL + '/register.html';
            else window.location.href = API_URL + '/' + pagina;
        }

        // ==========================================================
        // 🎵 SECCIÓN 9.4: FUNCIÓN CAMPANITA
        // ==========================================================
        function playCampanita() {
            const audio = document.getElementById('campanita');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(function(e) {
                    console.log('Error al reproducir sonido:', e);
                });
            }
        }

        // ==========================================================
        // 🔐 SECCIÓN 9.5: LOGIN CON FIREBASE (CORREGIDO - TODOS LOS ROLES)
        // ==========================================================
        async function loginFirebase(event) {
            event.preventDefault();

            var usernameOrEmail = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('btnLogin');
            var originalText = btn.innerHTML;

            if (!usernameOrEmail || !password) {
                Swal.fire({
                    title: 'Error',
                    text: 'Completa todos los campos',
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
                return;
            }

            btn.innerHTML = '<span class="loading-spinner"></span> Verificando...';
            btn.disabled = true;

            try {
                var email = usernameOrEmail;

                // Si NO es email, buscar el email por username en la base de datos
                if (!usernameOrEmail.includes('@')) {
                    var snapshot = await database.ref('usuarios').orderByChild('username').equalTo(usernameOrEmail)
                        .once('value');

                    if (!snapshot.exists()) {
                        throw new Error('Usuario no encontrado');
                    }

                    var foundEmail = null;
                    snapshot.forEach(function(child) {
                        foundEmail = child.val().email;
                    });

                    if (!foundEmail) {
                        throw new Error('Usuario no encontrado');
                    }
                    email = foundEmail;
                }

                // Autenticar con Firebase
                var userCredential = await firebase.auth().signInWithEmailAndPassword(email, password);
                var user = userCredential.user;

                // Obtener datos del usuario desde Realtime Database
                var snapshot = await database.ref('usuarios/' + user.uid).once('value');
                var userData = snapshot.val();

                if (!userData) {
                    throw new Error('No se encontraron datos de usuario en la base de datos');
                }

                // Guardar datos en localStorage para sesión
                localStorage.setItem('usuarioUid', user.uid);
                localStorage.setItem('usuarioEmail', user.email);
                localStorage.setItem('usuarioNombre', userData.nombre || userData.nombreCompleto || 'Usuario');
                localStorage.setItem('usuarioRol', userData.rol || 'USUARIO');
                localStorage.setItem('usuarioTipoBusero', userData.tipoBusero || '');  
                localStorage.setItem('usuarioPrestataria', userData.prestataria || '');
                localStorage.setItem('usuarioUsername', userData.username || '');

                // Guardar logo de la prestataria si tiene
                if (userData.prestataria && PRESTATARIAS[userData.prestataria]) {
                    localStorage.setItem('usuarioLogo', PRESTATARIAS[userData.prestataria].logo);
                    localStorage.setItem('usuarioPrestatariaNombre', PRESTATARIAS[userData.prestataria].nombre);
                }

                // Registrar última conexión
                await database.ref('usuarios/' + user.uid).update({
                    ultimaConexion: new Date().toISOString()
                });

                // Reproducir campanita
                playCampanita();

                // Obtener información de la prestataria para mostrar
                var prestatariaId = userData.prestataria || '';
                var prestatariaInfo = prestatariaId && PRESTATARIAS[prestatariaId] ? PRESTATARIAS[prestatariaId] : null;
                var logoPath = prestatariaInfo ? LOGO_BASE_PATH + prestatariaInfo.logo : '/CUPOTAX.png';
                var prestatariaNombre = prestatariaInfo ? prestatariaInfo.nombre : 'CupoTax';

                // Mostrar mensaje de éxito con logo
                Swal.fire({
                    title: '🎉 ¡Bienvenido/a!',
                    html: `
                                <div style="text-align: center;">
                                    <div style="margin: 0 auto 1rem; width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent);">
                                        <img src="${logoPath}" alt="${prestatariaNombre}" style="width: 100%; height: 100%; object-fit: contain; background: white;" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-building\\' style=\\'font-size: 3rem; color: var(--accent);\\'></i>';">
                                    </div>
                                    <h3 style="color: var(--accent);">${prestatariaNombre}</h3>
                                    <p style="color: var(--text-secondary);">Hola <strong>${userData.nombre || userData.nombreCompleto || 'Usuario'}</strong></p>
                                    <p style="color: var(--text-secondary); font-size: 0.8rem;">Rol: ${userData.rol || 'USUARIO'}</p>
                                </div>
                            `,
                    icon: 'success',
                    timer: 2500,
                    showConfirmButton: false,
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)'
                });

                // ==========================================================
                // 🔥 SECCIÓN CORREGIDA: REDIRECCIÓN SEGÚN ROL (TODOS LOS ROLES)
                // ==========================================================
                setTimeout(function() {
                    var rol = userData.rol || 'USUARIO';
                    var redirectUrl = '/';

                    // ==========================================================
                    // TODOS LOS ROLES SOPORTADOS EN EL REGISTER:
                    // - ADMIN → /admin
                    // - TAXISTA → /taxista
                    // - BUSERO → /busero (NORMAL y DAVID_PANAMA)
                    // - ESTUDIANTE → /usuario
                    // - USUARIO → /usuario
                    // ==========================================================
                    if (rol === 'ADMIN') {
                        redirectUrl = '/admin';
                    } else if (rol === 'TAXISTA') {
                        redirectUrl = '/taxista';
                    } else if (rol === 'BUSERO') {
                        redirectUrl = '/busero';
                    } else if (rol === 'ESTUDIANTE') {
                        // Estudiante usa el mismo panel que usuario
                        redirectUrl = '/usuario';
                    } else {
                        // USUARIO y cualquier otro rol
                        redirectUrl = '/usuario';
                    }

                    console.log('✅ Redirigiendo a:', redirectUrl);
                    console.log('📋 Rol:', rol);
                    console.log('📋 Tipo Busero:', userData.tipoBusero || 'N/A');
                    window.location.href = API_URL + redirectUrl;
                }, 2500);

            } catch (error) {
                console.error('Error en login:', error);

                var mensaje = 'Error al iniciar sesión';
                if (error.code === 'auth/user-not-found') {
                    mensaje = 'No existe una cuenta con este correo o usuario';
                } else if (error.code === 'auth/wrong-password') {
                    mensaje = 'Contraseña incorrecta';
                } else if (error.code === 'auth/invalid-email') {
                    mensaje = 'Correo electrónico inválido';
                } else if (error.code === 'auth/too-many-requests') {
                    mensaje = 'Demasiados intentos. Intenta más tarde';
                } else if (error.message) {
                    mensaje = error.message;
                }

                Swal.fire({
                    title: 'Error',
                    text: mensaje,
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==========================================================
        // 🔑 SECCIÓN 9.6: RECUPERACIÓN DE CONTRASEÑA
        // ==========================================================
        function abrirRecuperacion() {
            Swal.fire({
                title: 'Recuperar contraseña',
                html: `
                            <select id="metodoRecuperacion" style="background:var(--input-bg); color:var(--text-primary); border:1px solid var(--accent); border-radius:12px; padding:8px; width:100%; margin-bottom:12px;">
                                <option value="email">📧 Recuperar con correo electrónico</option>
                                <option value="pin">🔐 Recuperar con PIN de seguridad</option>
                                <option value="sms">📱 Recuperar con SMS (teléfono)</option>
                            </select>
                            <input type="text" id="valorRecuperacion" placeholder="Correo / PIN / Teléfono" style="background:var(--input-bg); color:var(--text-primary); border:1px solid var(--accent); border-radius:12px; padding:8px; width:100%;">
                            <div id="pinHint" style="font-size:0.7rem; color:var(--text-secondary); margin-top:5px; text-align:left;"></div>
                        `,
                showCancelButton: true,
                confirmButtonText: 'Recuperar',
                cancelButtonText: 'Cancelar',
                background: 'var(--card-bg)',
                color: 'var(--text-primary)',
                confirmButtonColor: 'var(--accent)',
                didOpen: function() {
                    var select = document.getElementById('metodoRecuperacion');
                    var hint = document.getElementById('pinHint');
                    if (select && hint) {
                        select.addEventListener('change', function() {
                            if (select.value === 'pin') {
                                hint.innerHTML = '💡 Ingresa el PIN de 6 dígitos que registraste al crear tu cuenta';
                            } else if (select.value === 'email') {
                                hint.innerHTML = '💡 Ingresa el correo electrónico con el que te registraste';
                            } else {
                                hint.innerHTML = '💡 Ingresa tu número de teléfono (ej: 6663-7549)';
                            }
                        });
                    }
                },
                preConfirm: function() {
                    var metodo = document.getElementById('metodoRecuperacion').value;
                    var valor = document.getElementById('valorRecuperacion').value;
                    if (!valor) Swal.showValidationMessage('Completa el campo');
                    return { metodo: metodo, valor: valor };
                }
            }).then(function(result) {
                if (result.isConfirmed) {
                    recuperarContraseñaFirebase(result.value.metodo, result.value.valor);
                }
            });
        }

        async function recuperarContraseñaFirebase(metodo, valor) {
            try {
                if (metodo === 'email') {
                    await firebase.auth().sendPasswordResetEmail(valor);
                    Swal.fire({
                        title: 'Correo enviado',
                        text: 'Se ha enviado un enlace para restablecer tu contraseña a ' + valor,
                        icon: 'success',
                        background: 'var(--card-bg)',
                        color: 'var(--text-primary)',
                        confirmButtonColor: 'var(--accent)'
                    });
                } else if (metodo === 'pin') {
                    var snapshot = await database.ref('usuarios').orderByChild('pinSeguridad').equalTo(valor).once(
                        'value');

                    if (!snapshot.exists()) {
                        throw new Error('PIN de seguridad incorrecto');
                    }

                    var userEmail = null;
                    snapshot.forEach(function(child) {
                        userEmail = child.val().email;
                    });

                    if (userEmail) {
                        await firebase.auth().sendPasswordResetEmail(userEmail);
                        Swal.fire({
                            title: 'PIN verificado',
                            text: 'Se ha enviado un enlace para restablecer tu contraseña a ' + userEmail,
                            icon: 'success',
                            background: 'var(--card-bg)',
                            color: 'var(--text-primary)',
                            confirmButtonColor: 'var(--accent)'
                        });
                    } else {
                        throw new Error('No se encontró un email asociado a este PIN');
                    }
                } else if (metodo === 'sms') {
                    var snapshot = await database.ref('usuarios').orderByChild('telefono').equalTo(valor).once(
                        'value');

                    if (!snapshot.exists()) {
                        throw new Error('Número de teléfono no registrado');
                    }

                    var userEmail = null;
                    var userTelefono = null;
                    snapshot.forEach(function(child) {
                        userEmail = child.val().email;
                        userTelefono = child.val().telefono;
                    });

                    if (userEmail) {
                        await firebase.auth().sendPasswordResetEmail(userEmail);
                        Swal.fire({
                            title: 'Teléfono verificado',
                            text: 'Se ha enviado un enlace para restablecer tu contraseña al correo asociado a ' +
                                userTelefono,
                            icon: 'success',
                            background: 'var(--card-bg)',
                            color: 'var(--text-primary)',
                            confirmButtonColor: 'var(--accent)'
                        });
                    } else {
                        throw new Error('No se encontró un email asociado a este teléfono');
                    }
                }
            } catch (error) {
                Swal.fire({
                    title: 'Error',
                    text: error.message,
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
            }
        }

        // ==========================================================
        // 🎨 SECCIÓN 9.7: PANEL DE AJUSTES (TEMAS)
        // ==========================================================
        function toggleSettingsPanel() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function setEstilo(estilo) {
            document.body.classList.remove('style-fire', 'style-glass', 'style-neon', 'style-crimson', 'light-mode');
            if (estilo === 'fire') document.body.classList.add('style-fire');
            else if (estilo === 'glass') document.body.classList.add('style-glass');
            else if (estilo === 'neon') document.body.classList.add('style-neon');
            else if (estilo === 'crimson') document.body.classList.add('style-crimson');
            localStorage.setItem('cupotax-login-estilo', estilo);
            localStorage.removeItem('cupotax-login-light');
            actualizarCards(estilo);
            var nombreTema = estilo === 'fire' ? 'Naranja Fuego' : estilo === 'glass' ? 'Glass Azul' : estilo === 'neon' ?
                'Neon Glow' : 'Crimson Glass';
            Swal.fire({
                title: 'Estilo ' + nombreTema + ' aplicado',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }

        function toggleLightMode() {
            if (document.body.classList.contains('light-mode')) {
                document.body.classList.remove('light-mode');
                var estilo = localStorage.getItem('cupotax-login-estilo') || 'fire';
                if (estilo === 'fire') document.body.classList.add('style-fire');
                else if (estilo === 'glass') document.body.classList.add('style-glass');
                else if (estilo === 'neon') document.body.classList.add('style-neon');
                else if (estilo === 'crimson') document.body.classList.add('style-crimson');
                localStorage.removeItem('cupotax-login-light');
            } else {
                document.body.classList.add('light-mode');
                localStorage.setItem('cupotax-login-light', 'true');
            }
            Swal.fire({
                title: document.body.classList.contains('light-mode') ? 'Modo claro' : 'Modo oscuro',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }

        function resetearEstilos() {
            document.body.classList.remove('style-glass', 'style-neon', 'style-crimson', 'light-mode');
            document.body.classList.add('style-fire');
            localStorage.setItem('cupotax-login-estilo', 'fire');
            localStorage.removeItem('cupotax-login-light');
            actualizarCards('fire');
            Swal.fire({
                title: 'Estilos restaurados',
                text: 'Volviste a Naranja Fuego',
                icon: 'success',
                timer: 1500,
                showConfirmButton: false
            });
        }

        function actualizarCards(estilo) {
            document.getElementById('cardFire')?.classList.remove('active');
            document.getElementById('cardGlass')?.classList.remove('active');
            document.getElementById('cardNeon')?.classList.remove('active');
            document.getElementById('cardCrimson')?.classList.remove('active');
            if (estilo === 'fire') document.getElementById('cardFire')?.classList.add('active');
            else if (estilo === 'glass') document.getElementById('cardGlass')?.classList.add('active');
            else if (estilo === 'neon') document.getElementById('cardNeon')?.classList.add('active');
            else if (estilo === 'crimson') document.getElementById('cardCrimson')?.classList.add('active');
        }

        // ==========================================================
        // 🔥 SECCIÓN 9.8: INICIALIZACIÓN
        // ==========================================================
        // Cargar tema guardado
        var estiloGuardado = localStorage.getItem('cupotax-login-estilo') || 'fire';
        var lightGuardado = localStorage.getItem('cupotax-login-light') === 'true';
        if (estiloGuardado === 'glass') document.body.classList.add('style-glass');
        else if (estiloGuardado === 'neon') document.body.classList.add('style-neon');
        else if (estiloGuardado === 'crimson') document.body.classList.add('style-crimson');
        else document.body.classList.add('style-fire');
        if (lightGuardado) document.body.classList.add('light-mode');
        actualizarCards(estiloGuardado);

        // ==========================================================
        // 🔄 SECCIÓN 9.9: VERIFICAR SESIÓN ACTIVA (CORREGIDO - TODOS LOS ROLES)
        // ==========================================================
        firebase.auth().onAuthStateChanged(function(user) {
            if (user) {
                console.log('Usuario ya autenticado:', user.email);
                // Redirigir automáticamente al dashboard correspondiente
                database.ref('usuarios/' + user.uid).once('value').then(function(snapshot) {
                    var userData = snapshot.val();
                    if (userData) {
                        var rol = userData.rol || 'USUARIO';
                        var redirectUrl = '/';
                        
                        // ==========================================================
                        // TODOS LOS ROLES SOPORTADOS (IGUAL QUE EN EL LOGIN)
                        // ==========================================================
                        if (rol === 'ADMIN') {
                            redirectUrl = '/admin';
                        } else if (rol === 'TAXISTA') {
                            redirectUrl = '/taxista';
                        } else if (rol === 'BUSERO') {
                            redirectUrl = '/busero';
                        } else if (rol === 'ESTUDIANTE') {
                            redirectUrl = '/usuario';
                        } else {
                            redirectUrl = '/usuario';
                        }
                        
                        console.log('✅ Sesión activa - Redirigiendo a:', redirectUrl);
                        window.location.href = API_URL + redirectUrl;
                    }
                }).catch(function(error) {
                    console.error('Error al obtener datos del usuario:', error);
                });
            }
        });

        // ==========================================================
        // ❌ SECCIÓN 9.10: CERRAR PANEL AL HACER CLIC FUERA
        // ==========================================================
        window.onclick = function(e) {
            var panel = document.getElementById('settingsPanel');
            var btn = document.querySelector('.settings-toggle');
            if (panel && panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn && !btn
                .contains(e.target)) {
                panel.classList.remove('open');
            }
        }
    </script>

</body>
</html>
