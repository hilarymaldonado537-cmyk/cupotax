    <!-- ==========================================================
    JAVASCRIPT COMPLETO
    ========================================================== -->
    <script>
        // ==========================================================
        // 📋 DATOS DE PRESTATARIAS (para logo en login)
        // ==========================================================
        const PRESTATARIAS = {
            sincotavecop: { nombre: 'SINCOTAVECOP', logo: 'SINCOTAVECOP.png', color: '#3B82F6' },
            la_union: { nombre: 'LA UNION', logo: 'LAUNION.png', color: '#10B981' },
            taxi_25: { nombre: 'EXPRESO TAXI 25 S.A', logo: 'TAXI25.png', color: '#06B6D4' },
            urraca: { nombre: 'COOPERATIVA URRACA R.L.', logo: 'URRACA.png', color: '#22C55E' },
            chiriqui_grande: { nombre: 'COOPERATIVA CHIRIQUI GRANDE', logo: 'CHIRIQUIGRANDE.png', color: '#4ADE80' },
            tranceibosa: { nombre: 'TRANCEIBOSA', logo: 'TRANCEIBOSA.png', color: '#14B8A6' },
            selectivo_bocas: { nombre: 'SELECTIVO BOCAS S.A.', logo: 'SELECTIVOBOCAS.png', color: '#84CC16' }
        };

        const LOGO_BASE_PATH = './static/';

        // ==========================================================
        // 🛡️ FUNCIONES DE SEGURIDAD
        // ==========================================================

        // Sanitización de texto
        function sanitizar(texto) {
            if (!texto) return '';
            return texto
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
                .replace(/\//g, '&#047;')
                .replace(/`/g, '&#096;')
                .replace(/=/g, '&#061;');
        }

        // Detectar caracteres peligrosos
        function detectarAtaque(texto) {
            if (!texto) return false;
            const patronesPeligrosos = [
                /<script/i, /<\/script>/i, /onerror\s*=/i, /onload\s*=/i,
                /onclick\s*=/i, /eval\s*\(/i, /document\.cookie/i, /alert\s*\(/i,
                /prompt\s*\(/i, /confirm\s*\(/i, /fetch\s*\(/i, /xmlhttprequest/i,
                /\.exe/i, /\.bat/i, /\.sh/i, /\.cmd/i, /\.dmg/i, /\.app/i
            ];
            for (const patron of patronesPeligrosos) {
                if (patron.test(texto)) return true;
            }
            return false;
        }

        // ==========================================================
        // 🔐 SISTEMA DE INTENTOS FALLIDOS
        // ==========================================================
        let intentosFallidos = {};
        let bloqueosActivos = {};

        function verificarBloqueo(email) {
            if (!email) return true;
            const bloqueo = bloqueosActivos[email];
            if (!bloqueo) return true;
            if (Date.now() > bloqueo) {
                delete bloqueosActivos[email];
                delete intentosFallidos[email];
                return true;
            }
            return false;
        }

        function registrarIntentoFallido(email) {
            if (!email) return;
            if (!intentosFallidos[email]) intentosFallidos[email] = 0;
            intentosFallidos[email]++;

            if (intentosFallidos[email] >= 5) {
                const tiempos = [5, 15, 30, 60];
                const index = Math.min(Math.floor((intentosFallidos[email] - 5) / 3), tiempos.length - 1);
                const minutos = tiempos[index] || 60;
                bloqueosActivos[email] = Date.now() + (minutos * 60 * 1000);
                intentosFallidos[email] = 0;

                registrarAuditoria('bloqueo_seguridad', 'Bloqueado por 5 intentos fallidos: ' + email);
            }
        }

        function resetearIntentos(email) {
            if (email) {
                delete intentosFallidos[email];
                delete bloqueosActivos[email];
            }
        }

        // ==========================================================
        // 🎵 FUNCIÓN DE SONIDO
        // ==========================================================
        function playCampanita() {
            try {
                const audio = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');
                audio.volume = 0.3;
                audio.play().catch(function(e) { console.log('Error al reproducir sonido:', e); });
            } catch (e) { console.log('Error con el sonido:', e); }
        }

        // ==========================================================
        // 📱 FUNCIONES DE NAVEGACIÓN
        // ==========================================================
        function navegarA(pagina) {
            if (pagina === '') window.location.href = API_URL + '/';
            else if (pagina === 'register') window.location.href = API_URL + '/register.html';
            else window.location.href = API_URL + '/' + pagina;
        }

        // ==========================================================
        // 🔐 LOGIN CON FIREBASE
        // ==========================================================
        async function loginFirebase(event) {
            event.preventDefault();

            const btn = document.getElementById('btnLogin');
            const originalText = btn.innerText;

            const usernameOrEmail = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!usernameOrEmail || !password) {
                Swal.fire({
                    title: 'Error',
                    text: 'Completa todos los campos',
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
                return;
            }

            // Detectar ataques en entrada
            if (detectarAtaque(usernameOrEmail) || detectarAtaque(password)) {
                registrarAuditoria('ataque_login', 'Intento de XSS en login');
                Swal.fire({
                    title: '🚨 Ataque detectado',
                    text: 'Se ha detectado un intento de ataque. Tu IP ha sido registrada.',
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
                return;
            }

            btn.innerHTML = '<span class="loading-spinner"></span> Verificando...';
            btn.disabled = true;

            try {
                let email = usernameOrEmail;

                // Si NO es email, buscar por username
                if (!usernameOrEmail.includes('@')) {
                    const snapshot = await database.ref('usuarios').orderByChild('username')
                        .equalTo(usernameOrEmail.toLowerCase()).once('value');

                    if (!snapshot.exists()) {
                        registrarIntentoFallido(usernameOrEmail);
                        throw new Error('Usuario no encontrado');
                    }

                    let foundEmail = null;
                    snapshot.forEach(function(child) {
                        foundEmail = child.val().email;
                    });

                    if (!foundEmail) {
                        registrarIntentoFallido(usernameOrEmail);
                        throw new Error('Usuario no encontrado');
                    }
                    email = foundEmail;
                }

                // Verificar bloqueo
                if (!verificarBloqueo(email)) {
                    const bloqueo = bloqueosActivos[email];
                    const tiempoRestante = Math.ceil((bloqueo - Date.now()) / 60000);
                    throw new Error('Cuenta bloqueada. Espera ' + tiempoRestante + ' minutos e intenta nuevamente.');
                }

                // Autenticar
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;

                // Obtener datos del usuario
                const snapshot = await database.ref('usuarios/' + user.uid).once('value');
                const userData = snapshot.val();

                if (!userData) {
                    throw new Error('No se encontraron datos de usuario');
                }

                // Verificar estado
                if (userData.estado === 'Inactivo' || userData.estado === 'Bloqueado') {
                    throw new Error('Tu cuenta está bloqueada. Contacta al administrador.');
                }

                // Resetear intentos fallidos
                resetearIntentos(email);

                // Guardar en localStorage
                localStorage.setItem('usuarioUid', user.uid);
                localStorage.setItem('usuarioEmail', user.email);
                localStorage.setItem('usuarioNombre', sanitizar(userData.nombre || userData.nombreCompleto || 'Usuario'));
                localStorage.setItem('usuarioRol', userData.rol || 'USUARIO');
                localStorage.setItem('usuarioTipoBusero', userData.tipoBusero || '');
                localStorage.setItem('usuarioPrestataria', userData.prestataria || '');
                localStorage.setItem('usuarioUsername', userData.username || '');
                localStorage.setItem('usuarioCedula', userData.cedula || '');
                localStorage.setItem('usuarioTelefono', userData.telefono || '');

                if (userData.vehiculo) {
                    localStorage.setItem('usuarioVehiculo', JSON.stringify(userData.vehiculo));
                }

                if (userData.prestataria && PRESTATARIAS[userData.prestataria]) {
                    localStorage.setItem('usuarioLogo', PRESTATARIAS[userData.prestataria].logo);
                    localStorage.setItem('usuarioPrestatariaNombre', PRESTATARIAS[userData.prestataria].nombre);
                }

                // Actualizar última conexión
                await database.ref('usuarios/' + user.uid + '/ultimaConexion').set(new Date().toISOString());

                // Registrar auditoría
                registrarAuditoria('login_exitoso', 'Inicio de sesión: ' + user.email);

                // Reproducir campanita
                playCampanita();

                // Obtener información de prestataria
                let prestatariaInfo = null;
                if (userData.prestataria && PRESTATARIAS[userData.prestataria]) {
                    prestatariaInfo = PRESTATARIAS[userData.prestataria];
                }
                const prestatariaNombre = prestatariaInfo ? prestatariaInfo.nombre : 'CupoTax';
                const logoPath = prestatariaInfo ? LOGO_BASE_PATH + prestatariaInfo.logo : '/CUPOTAX.png';

                // Mostrar mensaje de éxito
                Swal.fire({
                    title: '🎉 ¡Bienvenido/a!',
                    html: `
                        <div style="text-align: center;">
                            <div style="margin: 0 auto 1rem; width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 3px solid var(--accent);">
                                <img src="${logoPath}" alt="${prestatariaNombre}" style="width: 100%; height: 100%; object-fit: contain; background: white;" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-building\\' style=\\'font-size: 3rem; color: var(--accent);\\'></i>';">
                            </div>
                            <h3 style="color: var(--accent);">${prestatariaNombre}</h3>
                            <p style="color: var(--text-secondary);">Hola <strong>${sanitizar(userData.nombre || userData.nombreCompleto || 'Usuario')}</strong></p>
                            <p style="color: var(--text-secondary); font-size: 0.8rem;">Rol: ${userData.rol || 'USUARIO'}</p>
                        </div>
                    `,
                    icon: 'success',
                    timer: 2500,
                    showConfirmButton: false,
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)'
                });

                // Redirigir según rol
                setTimeout(function() {
                    const rol = userData.rol || 'USUARIO';
                    let redirectUrl = '/';

                    if (rol === 'ADMIN') redirectUrl = '/admin';
                    else if (rol === 'TAXISTA') redirectUrl = '/taxista';
                    else if (rol === 'BUSERO') redirectUrl = '/busero';
                    else redirectUrl = '/usuario';

                    window.location.href = API_URL + redirectUrl;
                }, 2500);

            } catch (error) {
                console.error('Error en login:', error);

                let mensaje = 'Error al iniciar sesión';

                if (error.code === 'auth/user-not-found') {
                    mensaje = 'No existe una cuenta con este correo o usuario';
                } else if (error.code === 'auth/wrong-password') {
                    mensaje = 'Contraseña incorrecta';
                    if (document.getElementById('username').value.trim()) {
                        registrarIntentoFallido(document.getElementById('username').value.trim());
                    }
                } else if (error.code === 'auth/invalid-email') {
                    mensaje = 'Correo electrónico inválido';
                } else if (error.code === 'auth/too-many-requests') {
                    mensaje = 'Demasiados intentos. Espera unos minutos e intenta nuevamente.';
                } else if (error.message) {
                    mensaje = error.message;
                }

                registrarAuditoria('login_fallido', 'Intento fallido: ' + mensaje);

                Swal.fire({
                    title: 'Error',
                    text: mensaje,
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==========================================================
        // 🔑 RECUPERACIÓN DE CONTRASEÑA (4 métodos)
        // ==========================================================
        function abrirRecuperacion() {
            Swal.fire({
                title: 'Recuperar contraseña',
                html: `
                    <div style="text-align: left;">
                        <div class="form-group">
                            <label>MÉTODO DE RECUPERACIÓN</label>
                            <select id="metodoRecuperacion" style="width:100%; padding:0.7rem; background:var(--input-bg); color:var(--text-primary); border:1px solid var(--accent); border-radius:12px;">
                                <option value="email">📧 Recuperar por correo electrónico</option>
                                <option value="sms">📱 Recuperar por SMS</option>
                                <option value="whatsapp">💬 Recuperar por WhatsApp</option>
                                <option value="pin">🔐 Recuperar con PIN de seguridad</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label id="labelRecuperacion">CORREO ELECTRÓNICO</label>
                            <input type="text" id="valorRecuperacion" placeholder="Ingresa tu correo electrónico" style="width:100%; padding:0.7rem; background:var(--input-bg); color:var(--text-primary); border:1px solid var(--glass-border); border-radius:12px;">
                        </div>
                        <div id="pinHint" style="font-size:0.7rem; color:var(--text-secondary); margin-top:0.3rem;"></div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Recuperar',
                cancelButtonText: 'Cancelar',
                background: 'var(--card-bg)',
                color: 'var(--text-primary)',
                confirmButtonColor: 'var(--accent)',
                didOpen: function() {
                    const select = document.getElementById('metodoRecuperacion');
                    const input = document.getElementById('valorRecuperacion');
                    const label = document.getElementById('labelRecuperacion');
                    const hint = document.getElementById('pinHint');

                    select.addEventListener('change', function() {
                        const metodo = select.value;
                        if (metodo === 'email') {
                            label.textContent = 'CORREO ELECTRÓNICO';
                            input.placeholder = 'Ingresa tu correo electrónico';
                            hint.innerHTML = '💡 Se enviará un enlace de restablecimiento a tu correo.';
                        } else if (metodo === 'sms') {
                            label.textContent = 'NÚMERO DE TELÉFONO';
                            input.placeholder = 'Ej: 6663-7549';
                            hint.innerHTML = '💡 Se enviará un código de verificación por SMS.';
                        } else if (metodo === 'whatsapp') {
                            label.textContent = 'NÚMERO DE TELÉFONO';
                            input.placeholder = 'Ej: 6663-7549';
                            hint.innerHTML = '💡 Se enviará un enlace de recuperación por WhatsApp.';
                        } else if (metodo === 'pin') {
                            label.textContent = 'PIN DE SEGURIDAD (6 dígitos)';
                            input.placeholder = 'Ingresa tu PIN de 6 dígitos';
                            hint.innerHTML = '💡 Ingresa el PIN que registraste al crear tu cuenta.';
                        }
                    });
                },
                preConfirm: function() {
                    const metodo = document.getElementById('metodoRecuperacion').value;
                    const valor = document.getElementById('valorRecuperacion').value.trim();
                    if (!valor) {
                        Swal.showValidationMessage('Completa el campo');
                        return null;
                    }
                    return { metodo: metodo, valor: valor };
                }
            }).then(function(result) {
                if (result.isConfirmed && result.value) {
                    procesarRecuperacion(result.value.metodo, result.value.valor);
                }
            });
        }

        async function procesarRecuperacion(metodo, valor) {
            try {
                let emailEncontrado = null;
                let telefonoEncontrado = null;
                let nombreEncontrado = null;

                if (metodo === 'email') {
                    // Buscar usuario por email
                    const snapshot = await database.ref('usuarios').orderByChild('email').equalTo(valor.toLowerCase())
                        .once('value');
                    if (!snapshot.exists()) {
                        throw new Error('No existe una cuenta con este correo electrónico');
                    }
                    emailEncontrado = valor.toLowerCase();
                    snapshot.forEach(function(child) {
                        nombreEncontrado = child.val().nombre;
                    });
                    await auth.sendPasswordResetEmail(emailEncontrado);
                    registrarAuditoria('recuperacion_email', 'Recuperación por email: ' + emailEncontrado);
                    Swal.fire({
                        title: '📧 Correo enviado',
                        text: 'Se ha enviado un enlace para restablecer tu contraseña a ' + emailEncontrado,
                        icon: 'success',
                        background: 'var(--card-bg)',
                        color: 'var(--text-primary)',
                        confirmButtonColor: 'var(--accent)'
                    });
                    return;
                }

                if (metodo === 'sms' || metodo === 'whatsapp') {
                    // Buscar usuario por teléfono
                    const snapshot = await database.ref('usuarios').orderByChild('telefono').equalTo(valor).once(
                    'value');
                    if (!snapshot.exists()) {
                        throw new Error('No existe una cuenta con este número de teléfono');
                    }
                    snapshot.forEach(function(child) {
                        emailEncontrado = child.val().email;
                        telefonoEncontrado = child.val().telefono;
                        nombreEncontrado = child.val().nombre;
                    });

                    const mensaje = metodo === 'sms' ?
                        '📱 Se ha enviado un código de verificación por SMS a ' + telefonoEncontrado :
                        '💬 Se ha enviado un enlace de recuperación por WhatsApp a ' + telefonoEncontrado;

                    registrarAuditoria('recuperacion_' + metodo, 'Recuperación por ' + metodo + ': ' + telefonoEncontrado);

                    // Simular envío (en producción se usaría Twilio o API de WhatsApp)
                    Swal.fire({
                        title: metodo === 'sms' ? '📱 Código enviado' : '💬 Enlace enviado',
                        text: mensaje + '. En la versión final se integrará el servicio real.',
                        icon: 'success',
                        background: 'var(--card-bg)',
                        color: 'var(--text-primary)',
                        confirmButtonColor: 'var(--accent)'
                    });

                    // En producción, aquí se enviaría el código/enlace real
                    return;
                }

                if (metodo === 'pin') {
                    // Verificar PIN
                    if (!/^\d{6}$/.test(valor)) {
                        throw new Error('El PIN debe ser de 6 dígitos');
                    }

                    const snapshot = await database.ref('usuarios').orderByChild('pinSeguridad').equalTo(valor).once(
                        'value');
                    if (!snapshot.exists()) {
                        registrarAuditoria('recuperacion_pin_fallido', 'PIN incorrecto');
                        throw new Error('PIN de seguridad incorrecto');
                    }

                    snapshot.forEach(function(child) {
                        emailEncontrado = child.val().email;
                        nombreEncontrado = child.val().nombre;
                    });

                    // Enviar enlace al correo
                    await auth.sendPasswordResetEmail(emailEncontrado);
                    registrarAuditoria('recuperacion_pin_exitoso', 'PIN verificado para: ' + emailEncontrado);

                    Swal.fire({
                        title: '🔐 PIN verificado',
                        text: 'Se ha enviado un enlace para restablecer tu contraseña a ' + emailEncontrado,
                        icon: 'success',
                        background: 'var(--card-bg)',
                        color: 'var(--text-primary)',
                        confirmButtonColor: 'var(--accent)'
                    });
                    return;
                }

            } catch (error) {
                console.error('Error en recuperación:', error);
                registrarAuditoria('recuperacion_error', 'Error: ' + error.message);
                Swal.fire({
                    title: 'Error',
                    text: error.message,
                    icon: 'error',
                    background: 'var(--card-bg)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
            }
        }

        // ==========================================================
        // 🛡️ AUDITORÍA
        // ==========================================================
        function registrarAuditoria(accion, detalle) {
            if (typeof database === 'undefined') return;

            const data = {
                accion: accion,
                detalle: detalle || '',
                ip: '0.0.0.0',
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                pagina: 'login'
            };

            database.ref('auditoria').push(data).catch(function(err) {
                console.warn('No se pudo registrar auditoría:', err);
            });
        }

        // ==========================================================
        // 🎨 PANEL DE AJUSTES (TEMAS)
        // ==========================================================
        function toggleSettingsPanel() {
            document.getElementById('settingsPanel').classList.toggle('open');
        }

        function setEstilo(estilo) {
            document.body.classList.remove('style-fire', 'style-glass', 'style-neon', 'style-crimson', 'light-mode');
            if (estilo === 'fire') document.body.classList.add('style-fire');
            else if (estilo === 'glass') document.body.classList.add('style-glass');
            else if (estilo === 'neon') document.body.classList.add('style-neon');
            else if (estilo === 'crimson') document.body.classList.add('style-crimson');
            localStorage.setItem('cupotax-login-estilo', estilo);
            localStorage.removeItem('cupotax-login-light');
            actualizarCards(estilo);
            Swal.fire({ title: 'Estilo aplicado', icon: 'success', timer: 1500, showConfirmButton: false,
                background: 'var(--card-bg)', color: 'var(--text-primary)' });
        }

        function toggleLightMode() {
            if (document.body.classList.contains('light-mode')) {
                document.body.classList.remove('light-mode');
                var estilo = localStorage.getItem('cupotax-login-estilo') || 'fire';
                if (estilo === 'fire') document.body.classList.add('style-fire');
                else if (estilo === 'glass') document.body.classList.add('style-glass');
                else if (estilo === 'neon') document.body.classList.add('style-neon');
                else if (estilo === 'crimson') document.body.classList.add('style-crimson');
                localStorage.removeItem('cupotax-login-light');
            } else {
                document.body.classList.add('light-mode');
                localStorage.setItem('cupotax-login-light', 'true');
            }
            Swal.fire({ title: document.body.classList.contains('light-mode') ? 'Modo claro' : 'Modo oscuro',
                icon: 'success', timer: 1500, showConfirmButton: false, background: 'var(--card-bg)',
                color: 'var(--text-primary)' });
        }

        function resetearEstilos() {
            document.body.classList.remove('style-glass', 'style-neon', 'style-crimson', 'light-mode');
            document.body.classList.add('style-fire');
            localStorage.setItem('cupotax-login-estilo', 'fire');
            localStorage.removeItem('cupotax-login-light');
            actualizarCards('fire');
            Swal.fire({ title: 'Estilos restaurados', icon: 'success', timer: 1500, showConfirmButton: false,
                background: 'var(--card-bg)', color: 'var(--text-primary)' });
        }

        function actualizarCards(estilo) {
            document.getElementById('cardFire')?.classList.remove('active');
            document.getElementById('cardGlass')?.classList.remove('active');
            document.getElementById('cardNeon')?.classList.remove('active');
            document.getElementById('cardCrimson')?.classList.remove('active');
            document.getElementById('cardLight')?.classList.remove('active');
            if (estilo === 'fire') document.getElementById('cardFire')?.classList.add('active');
            else if (estilo === 'glass') document.getElementById('cardGlass')?.classList.add('active');
            else if (estilo === 'neon') document.getElementById('cardNeon')?.classList.add('active');
            else if (estilo === 'crimson') document.getElementById('cardCrimson')?.classList.add('active');
        }

        // ==========================================================
        // 🔥 INICIALIZACIÓN
        // ==========================================================
        document.addEventListener('DOMContentLoaded', function() {
            var estiloGuardado = localStorage.getItem('cupotax-login-estilo') || 'fire';
            var lightGuardado = localStorage.getItem('cupotax-login-light') === 'true';

            document.body.classList.remove('style-fire', 'style-glass', 'style-neon', 'style-crimson', 'light-mode');
            if (estiloGuardado === 'glass') document.body.classList.add('style-glass');
            else if (estiloGuardado === 'neon') document.body.classList.add('style-neon');
            else if (estiloGuardado === 'crimson') document.body.classList.add('style-crimson');
            else document.body.classList.add('style-fire');
            if (lightGuardado) document.body.classList.add('light-mode');
            actualizarCards(estiloGuardado);

            // Verificar sesión activa
            auth.onAuthStateChanged(function(user) {
                if (user) {
                    database.ref('usuarios/' + user.uid).once('value').then(function(snapshot) {
                        const userData = snapshot.val();
                        if (userData) {
                            const rol = userData.rol || 'USUARIO';
                            let redirectUrl = '/';
                            if (rol === 'ADMIN') redirectUrl = '/admin';
                            else if (rol === 'TAXISTA') redirectUrl = '/taxista';
                            else if (rol === 'BUSERO') redirectUrl = '/busero';
                            else redirectUrl = '/usuario';
                            window.location.href = API_URL + redirectUrl;
                        }
                    });
                }
            });
        });

        window.onclick = function(e) {
            var panel = document.getElementById('settingsPanel');
            var btn = document.querySelector('.settings-toggle');
            if (panel && panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn && !btn
                .contains(e.target)) {
                panel.classList.remove('open');
            }
        }
    </script>

</body>
</html>
