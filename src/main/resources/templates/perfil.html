<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CupoTax - Mi Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* TUS COLORES EXACTOS MODO OSCURO */
        :root {
            --glass-bg: rgba(22,19,22,0.85);
            --glass-border: rgba(255,109,41,0.4);
            --navbar-bg: #161316;
            --text-primary: #FFFFFF;
            --text-secondary: #BABABA;
            --accent: #FF6D29;
            --accent-neon: #FF6D29;
            --card-bg: #453027;
            --input-bg: #161316;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        
        /* MODO CLARO */
        body.light-mode {
            --glass-bg: rgba(255,255,255,0.95);
            --glass-border: rgba(0,0,0,0.15);
            --navbar-bg: #FFFFFF;
            --text-primary: #000000;
            --text-secondary: #453027;
            --accent: #FF6D29;
            --card-bg: #FFFFFF;
            --input-bg: #F5F5F5;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--navbar-bg);
            color: var(--text-primary);
            transition: all 0.3s ease;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
        }
        
        /* FONDO REAL DE BUS + TAXI */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/14840014/pexels-photo-14840014.jpeg?auto=compress&cs=tinysrgb&w=1600');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.25;
            z-index: -2;
        }
        
        /* Overlay oscuro para mejorar legibilidad */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
            pointer-events: none;
        }
        
        body.light-mode::after {
            background: rgba(255,255,255,0.7);
        }
        
        .profile-card {
            max-width: 700px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        h1 {
            text-align: center;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-neon));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.5rem;
        }
        
        .nav-links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--accent);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }
        
        .nav-btn:hover {
            background: rgba(255,109,41,0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(255,109,41,0.2);
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 24px;
            padding: 1.5rem;
        }
        
        .profile-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent);
            background: #333;
            box-shadow: 0 0 15px rgba(255,109,41,0.3);
        }
        
        .profile-info h2 {
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-size: 1.3rem;
        }
        
        .profile-info p {
            color: var(--text-secondary);
            margin: 0.3rem 0;
            font-size: 0.85rem;
        }
        
        .profile-info i {
            width: 25px;
            color: var(--accent);
        }
        
        h3 {
            color: var(--accent);
            margin: 1rem 0 1rem 0;
            font-size: 1rem;
            border-left: 3px solid var(--accent);
            padding-left: 0.7rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            color: var(--accent);
            font-size: 0.7rem;
            margin-bottom: 0.3rem;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(255,109,41,0.2);
        }
        
        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, var(--accent), var(--accent-neon));
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
            color: #000;
            font-size: 0.9rem;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(255,109,41,0.4);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.9rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: rgba(255,109,41,0.2);
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(255,109,41,0.2);
        }
        
        hr {
            margin: 1.5rem 0;
            border-color: var(--glass-border);
        }
        
        .photo-preview {
            margin-top: 10px;
        }
        
        .preview-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent);
        }
        
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(22,19,22,0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(255,109,41,0.3);
        }
        
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .profile-card { padding: 1.5rem; }
            .profile-header { flex-direction: column; text-align: center; }
            .profile-info { text-align: center; }
        }
    </style>
</head>
<body>
<div id="particles-container"></div>

<div class="profile-card">
    <h1>Mi Perfil</h1>
    
    <div class="nav-links">
        <a onclick="navegarA('')" class="nav-btn">INICIO</a>
        <a onclick="navegarA('perfil')" class="nav-btn">PERFIL</a>
        <a onclick="cerrarSesion()" class="nav-btn">SALIR</a>
    </div>
    
    <div class="profile-header">
        <img id="fotoPerfil" class="profile-photo" src="https://via.placeholder.com/100?text=Sin+foto" alt="Foto perfil">
        <div class="profile-info">
            <h2 id="nombrePerfil">Cargando...</h2>
            <p><i class="fas fa-envelope"></i> <span id="emailPerfil"></span></p>
            <p><i class="fas fa-phone"></i> <span id="telefonoPerfil"></span></p>
            <p><i class="fas fa-user-tag"></i> <span id="rolPerfil"></span></p>
        </div>
    </div>
    
    <h3>Editar perfil</h3>
    <div class="form-group"><label>NOMBRE COMPLETO</label><input type="text" id="editarNombre"></div>
    <div class="form-group"><label>TELEFONO</label><input type="text" id="editarTelefono"></div>
    <div class="form-group">
        <label>CAMBIAR FOTO</label>
        <input type="file" id="nuevaFoto" accept="image/*">
        <div id="previewNuevaFoto" class="photo-preview"></div>
    </div>
    <button class="btn" id="btnActualizarPerfil">ACTUALIZAR PERFIL</button>
    
    <hr>
    
    <h3>Cambiar contrasena</h3>
    <div class="form-group"><label>CONTRASENA ACTUAL</label><input type="password" id="passActual" placeholder="......"></div>
    <div class="form-group"><label>NUEVA CONTRASENA</label><input type="password" id="nuevaPass" placeholder="......"></div>
    <div class="form-group"><label>CONFIRMAR</label><input type="password" id="confirmarPass" placeholder="......"></div>
    <button class="btn-outline" id="btnCambiarPassword">CAMBIAR CONTRASENA</button>
</div>

<script>
    const API_URL = '';
    
    function generarParticulas() {
        const container = document.getElementById('particles-container');
        for (let i = 0; i < 40; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = 12 + Math.random() * 15 + 's';
            p.style.animationDelay = Math.random() * 10 + 's';
            p.style.background = Math.random() > 0.8 ? '#FF6D29' : '#FF6D29';
            container.appendChild(p);
        }
    }
    
    function navegarA(pagina) { 
        window.location.href = API_URL + '/' + pagina; 
    }
    
    function cerrarSesion() { 
        window.location.href = API_URL + '/logout'; 
    }
    
    async function cargarPerfil() {
        try {
            const res = await fetch(API_URL + '/api/perfil', {
                credentials: 'include'
            });
            if(!res.ok) { 
                window.location.href = API_URL + '/login'; 
                return; 
            }
            const data = await res.json();
            document.getElementById('nombrePerfil').innerText = data.nombreCompleto;
            document.getElementById('emailPerfil').innerText = data.email;
            document.getElementById('telefonoPerfil').innerText = data.telefono || 'No registrado';
            
            let rolTexto = '';
            if(data.rol === 'ADMIN') rolTexto = 'Administrador';
            else if(data.rol === 'TAXISTA') rolTexto = 'Taxista';
            else if(data.rol === 'BUSERO') rolTexto = 'Busero';
            else rolTexto = 'Usuario';
            document.getElementById('rolPerfil').innerHTML = rolTexto;
            
            document.getElementById('editarNombre').value = data.nombreCompleto;
            document.getElementById('editarTelefono').value = data.telefono || '';
            
            if(data.fotoPerfil) {
                document.getElementById('fotoPerfil').src = 'data:image/jpeg;base64,' + data.fotoPerfil;
            }
        } catch(e) { 
            window.location.href = API_URL + '/login'; 
        }
    }
    
    document.getElementById('nuevaFoto').addEventListener('change', function(e) {
        const preview = document.getElementById('previewNuevaFoto');
        preview.innerHTML = '';
        if(e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = ev => { 
                const img = document.createElement('img'); 
                img.src = ev.target.result; 
                img.className = 'preview-img'; 
                preview.appendChild(img); 
            };
            reader.readAsDataURL(e.target.files[0]);
        }
    });
    
    document.getElementById('btnActualizarPerfil').addEventListener('click', async () => {
        const formData = new FormData();
        formData.append('nombreCompleto', document.getElementById('editarNombre').value);
        formData.append('telefono', document.getElementById('editarTelefono').value);
        if(document.getElementById('nuevaFoto').files[0]) {
            formData.append('fotoPerfil', document.getElementById('nuevaFoto').files[0]);
        }
        
        try {
            const res = await fetch(API_URL + '/api/perfil/actualizar', { 
                method: 'POST', 
                credentials: 'include',
                body: formData 
            });
            const data = await res.json();
            if(data.success) { 
                Swal.fire('Exito', 'Perfil actualizado correctamente', 'success');
                cargarPerfil(); 
                document.getElementById('previewNuevaFoto').innerHTML = ''; 
                document.getElementById('nuevaFoto').value = '';
            } else {
                Swal.fire('Error', data.error || 'Error al actualizar', 'error');
            }
        } catch(e) { 
            Swal.fire('Error', 'Error de conexion con el servidor', 'error'); 
        }
    });
    
    document.getElementById('btnCambiarPassword').addEventListener('click', async () => {
        const actual = document.getElementById('passActual').value;
        const nueva = document.getElementById('nuevaPass').value;
        const confirmar = document.getElementById('confirmarPass').value;
        
        if(!actual || !nueva || !confirmar) { 
            Swal.fire('Error', 'Completa todos los campos', 'error'); 
            return; 
        }
        if(nueva !== confirmar) { 
            Swal.fire('Error', 'Las contrasenas no coinciden', 'error'); 
            return; 
        }
        if(nueva.length < 8 || !/[A-Z]/.test(nueva) || !/[a-z]/.test(nueva) || !/[0-9]/.test(nueva)) { 
            Swal.fire('Error', 'La contrasena debe tener al menos 8 caracteres, una mayuscula, una minuscula y un numero', 'error'); 
            return; 
        }
        
        const formData = new FormData();
        formData.append('actualPassword', actual);
        formData.append('nuevaPassword', nueva);
        
        try {
            const res = await fetch(API_URL + '/api/cambiar-password', { 
                method: 'POST', 
                credentials: 'include',
                body: formData 
            });
            const data = await res.json();
            if(data.success) {
                Swal.fire('Exito', 'Contrasena actualizada correctamente', 'success');
                document.getElementById('passActual').value = '';
                document.getElementById('nuevaPass').value = '';
                document.getElementById('confirmarPass').value = '';
            } else {
                Swal.fire('Error', data.error, 'error');
            }
        } catch(e) { 
            Swal.fire('Error', 'Error de conexion con el servidor', 'error'); 
        }
    });
    
    function toggleTheme() { 
        document.body.classList.toggle('light-mode'); 
        localStorage.setItem('cupotax-theme', document.body.classList.contains('light-mode') ? 'light' : 'dark'); 
        location.reload(); 
    }
    
    if(localStorage.getItem('cupotax-theme') === 'light') document.body.classList.add('light-mode');
    const btn = document.createElement('button'); 
    btn.className = 'theme-toggle'; 
    btn.innerHTML = '🌙'; 
    btn.onclick = toggleTheme; 
    document.body.appendChild(btn);
    
    generarParticulas();
    cargarPerfil();
</script>
</body>
</html>
