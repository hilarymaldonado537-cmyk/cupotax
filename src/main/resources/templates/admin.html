<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>CupoTax - Panel Administrador</title>

    <!-- ===== FUENTES Y LIBRERÍAS ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js">
    </script>
    <script src='https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.js'>
    </script>
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.8.0/mapbox-gl.css' rel='stylesheet' />

    <!-- ===== FIREBASE SDKs ===== -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js">
    </script>

    <style>
        /* ============================================================
                   RESET Y VARIABLES BASE
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --font: 'Inter', sans-serif;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 270px;
            --header-height: 70px;

            /* Colores base (se sobrescriben con JS) */
            --accent: #FF6A2A;
            --accent-neon: #FF8C42;
            --accent-glow: 0 0 25px rgba(255, 106, 42, 0.35);
            --gradient-glow: linear-gradient(135deg, #FF6A2A, #FF8C42);
            --bg-base: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-card: #1E1E1E;
            --bg-input: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --text-tertiary: #999999;
            --sidebar-bg: #0F0F0F;
            --hover-bg: #2A2A2A;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --success: #43E97B;
            --danger: #FF3D2E;
            --warning: #F9D423;
            --info: #3A86FF;
        }

        body {
            font-family: var(--font);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* ============================================================
                   MODO OSCURO (por defecto)
                   ============================================================ */
        body.dark-mode {
            --bg-base: #0A0A0A;
            --bg-secondary: #1A1A1A;
            --bg-card: #1E1E1E;
            --bg-input: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #FFFFFF;
            --text-secondary: #CCCCCC;
            --text-tertiary: #999999;
            --sidebar-bg: #0F0F0F;
            --hover-bg: #2A2A2A;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* ============================================================
                   MODO CLARO
                   ============================================================ */
        body.light-mode {
            --bg-base: #F0F2F5;
            --bg-secondary: #E4E6EB;
            --bg-card: #FFFFFF;
            --bg-input: #F0F0F0;
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-primary: #1A1A1A;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --sidebar-bg: #FFFFFF;
            --hover-bg: #F0F0F0;
            --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
        }

        /* ============================================================
                   SIDEBAR
                   ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--glass-border);
            padding: 1.5rem 1rem;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s ease, background 0.5s ease;
        }

        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .sidebar-logo {
            text-align: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 1.5rem;
        }
        .sidebar-logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto 0.5rem;
        }
        .sidebar-logo h3 {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: var(--transition);
        }
        .sidebar-logo h3.prestataria {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--text-primary);
        }

        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            margin-bottom: 0.15rem;
        }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 1rem;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: var(--transition);
            cursor: pointer;
        }
        .sidebar-menu a i {
            width: 22px;
            font-size: 1rem;
            text-align: center;
        }
        .sidebar-menu a:hover,
        .sidebar-menu a.active {
            background: var(--gradient-glow);
            color: #000;
            box-shadow: var(--accent-glow);
            transform: translateX(4px);
        }
        .sidebar-menu .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 0.8rem 0;
        }

        /* ============================================================
                   MAIN CONTENT
                   ============================================================ */
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 1.5rem 2rem;
            min-height: 100vh;
            transition: var(--transition);
        }

        /* ============================================================
                   TOP BAR
                   ============================================================ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--glass-border);
        }
        .top-bar .welcome h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-glow);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: var(--transition);
        }
        .top-bar .welcome p {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        #selectorPrestataria {
            background: var(--bg-input);
            border: 1px solid var(--glass-border);
            padding: 0.5rem 1rem;
            border-radius: 30px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            min-width: 180px;
            transition: var(--transition);
            outline: none;
        }
        #selectorPrestataria:focus {
            border-color: var(--accent);
        }
        #selectorPrestataria option {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .theme-toggle {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--accent);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            transform: scale(1.05);
            box-shadow: var(--accent-glow);
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1001;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            cursor: pointer;
            color: var(--accent);
            font-size: 1.1rem;
            transition: var(--transition);
        }
        .menu-toggle:hover {
            border-color: var(--accent);
        }

        /* ============================================================
                   STATS GRID
                   ============================================================ */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.2rem 1rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            cursor: default;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
        }
        .stat-card i {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
            transition: var(--transition);
        }
        .stat-card h3 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--accent);
            transition: var(--transition);
        }
        .stat-card p {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .stat-card .trend {
            font-size: 0.6rem;
            color: var(--success);
            margin-top: 0.2rem;
        }

        /* ============================================================
                   SECCIONES (cards)
                   ============================================================ */
        .section {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            transition: var(--transition);
            margin-bottom: 1.5rem;
        }
        .section:hover {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
        }
        .section h2 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-left: 0.8rem;
            border-left: 3px solid var(--accent);
            color: var(--text-primary);
            transition: var(--transition);
        }
        .section h2 i {
            color: var(--accent);
            margin-right: 8px;
            transition: var(--transition);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* ============================================================
                   PRESTATARIAS GRID
                   ============================================================ */
        .prestataria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1rem;
        }
        .prestataria-card {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 1.2rem;
            border: 1px solid var(--glass-border);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }
        .prestataria-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
        }
        .prestataria-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 0.5rem;
            border-radius: 8px;
        }
        .prestataria-card h3 {
            font-size: 0.8rem;
            color: var(--text-primary);
        }
        .prestataria-card p {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        /* ============================================================
                   ASOCIADOS
                   ============================================================ */
        .asociado-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 4px;
        }
        .asociado-item:last-child {
            border-bottom: none;
        }
        .asociado-item .cupo {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.7rem;
            background: var(--bg-input);
            padding: 2px 12px;
            border-radius: 20px;
            transition: var(--transition);
        }
        .asociado-item .nombre {
            color: var(--text-primary);
        }

        .asociados-lista {
            max-height: 400px;
            overflow-y: auto;
        }
        .asociados-lista::-webkit-scrollbar {
            width: 4px;
        }
        .asociados-lista::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* ============================================================
                   TABLAS
                   ============================================================ */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        .data-table th,
        .data-table td {
            padding: 0.6rem 0.5rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        .data-table th {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .data-table tr:hover {
            background: var(--hover-bg);
        }
        .table-responsive {
            overflow-x: auto;
        }

        /* ============================================================
                   BOTONES
                   ============================================================ */
        .btn-primary {
            background: var(--gradient-glow);
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            color: #000;
            transition: var(--transition);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--accent-glow);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-excel {
            background: transparent;
            border: 1px solid var(--glass-border);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-excel:hover {
            background: #28a745;
            color: #fff;
            border-color: #28a745;
        }

        .btn-danger {
            background: var(--danger);
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            color: #fff;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-danger:hover {
            opacity: 0.8;
            transform: scale(0.95);
        }

        .btn-success {
            background: var(--success);
            border: none;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            color: #000;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-success:hover {
            opacity: 0.8;
            transform: scale(0.95);
        }

        .btn-back {
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* ============================================================
                   MAPAS
                   ============================================================ */
        #mapaAdmin,
        #mapaPrestataria {
            height: 380px;
            width: 100%;
            border-radius: var(--radius-sm);
            border: 2px solid var(--accent);
            transition: var(--transition);
        }

        /* ============================================================
                   GRÁFICAS
                   ============================================================ */
        .chart-container {
            height: 230px;
            position: relative;
        }
        .ring-chart-container {
            height: 230px;
            position: relative;
        }

        /* ============================================================
                   CHAT / MENSAJERÍA
                   ============================================================ */
        .mensajes-container {
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .mensajes-container::-webkit-scrollbar {
            width: 4px;
        }
        .mensajes-container::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        .mensaje-item {
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            padding: 0.8rem 1rem;
            border-left: 3px solid var(--accent);
            transition: var(--transition);
        }
        .mensaje-item:hover {
            border-color: var(--accent-neon);
            box-shadow: var(--accent-glow);
        }
        .mensaje-item .remitente {
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--accent);
        }
        .mensaje-item .fecha {
            font-size: 0.6rem;
            color: var(--text-tertiary);
            float: right;
        }
        .mensaje-item .texto {
            font-size: 0.8rem;
            margin: 0.3rem 0;
            color: var(--text-primary);
        }
        .mensaje-item .adjuntos {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.3rem;
        }
        .mensaje-item .adjuntos a {
            font-size: 0.65rem;
            color: var(--info);
            text-decoration: none;
            background: var(--bg-input);
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }
        .mensaje-item .adjuntos a:hover {
            border-color: var(--accent);
        }
        .mensaje-item .respuesta {
            margin-top: 0.5rem;
            padding: 0.5rem 0.8rem;
            background: var(--hover-bg);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--success);
            font-size: 0.8rem;
        }
        .mensaje-item .respuesta .label {
            font-weight: 600;
            color: var(--success);
            font-size: 0.65rem;
        }
        .mensaje-item .estado {
            font-size: 0.6rem;
            padding: 2px 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .mensaje-item .estado.leido {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }
        .mensaje-item .estado.no-leido {
            background: rgba(255, 61, 46, 0.15);
            color: var(--danger);
        }
        .mensaje-item .estado.respondido {
            background: rgba(59, 130, 246, 0.15);
            color: var(--info);
        }
        .mensaje-item .estado.ataque {
            background: rgba(255, 61, 46, 0.25);
            color: var(--danger);
            font-weight: 700;
        }

        .chat-responder {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .chat-responder textarea {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            outline: none;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 60px;
            font-family: var(--font);
            transition: var(--transition);
        }
        .chat-responder textarea:focus {
            border-color: var(--accent);
        }
        .chat-responder .acciones {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        /* ============================================================
                   SOPORTE / CHAT IA
                   ============================================================ */
        .soporte-chat {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .soporte-chat-box {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .soporte-chat-box .chat-header {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .soporte-chat-box .chat-body {
            padding: 1rem 1.2rem;
            max-height: 220px;
            overflow-y: auto;
            min-height: 160px;
        }
        .soporte-chat-box .chat-body::-webkit-scrollbar {
            width: 4px;
        }
        .soporte-chat-box .chat-body::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }
        .soporte-chat-box .chat-footer {
            padding: 0.8rem 1rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .soporte-chat-box .chat-footer input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            outline: none;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .soporte-chat-box .chat-footer input:focus {
            border-color: var(--accent);
        }

        .ia-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 0 1.2rem 0.8rem 1.2rem;
        }
        .ia-btn {
            background: var(--hover-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 0.6rem;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-primary);
        }
        .ia-btn:hover {
            border-color: var(--accent);
            box-shadow: var(--accent-glow);
        }
        .ia-btn .icon {
            font-size: 1.2rem;
        }
        .ia-btn .label {
            font-size: 0.6rem;

            margin: 0.5rem auto;

            border-radius: 50%;

            opacity: 0.3;
            animation: spinHologram 8s linear infinite;

        let modoOscuro = true;

        function toggleTheme() {
            const icon = document.getElementById('themeToggle');
            if (document.body.classList.contains('light-mode')) {
                document.body.classList.remove('light-mode');
                document.body.classList.add('dark-mode');
                icon.innerHTML = '<i class="fas fa-moon"></i>';
                modoOscuro = true;
                localStorage.setItem('cupotax-theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                icon.innerHTML = '<i class="fas fa-sun"></i>';
                modoOscuro = false;
                localStorage.setItem('cupotax-theme', 'light');
            }
            if (prestatariaSeleccionada) {
                aplicarTemaPrestataria(prestatariaSeleccionada);
            }
        }

        const temaGuardado = localStorage.getItem('cupotax-theme');
        if (temaGuardado === 'light') {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
            modoOscuro = false;
        } else {
            document.body.classList.add('dark-mode');
            modoOscuro = true;
        }

        function aplicarTemaPrestataria(id) {
            const tema = temasPrestataria[id];
            if (!tema) return;

            const modo = modoOscuro ? tema.dark : tema.light;

            const root = document.documentElement;
            root.style.setProperty('--accent', modo.accent);
            root.style.setProperty('--accent-neon', modo.accentNeon);
            root.style.setProperty('--accent-glow', `0 0 25px ${modo.accent}55`);
            root.style.setProperty('--gradient-glow', `linear-gradient(135deg, ${modo.accent}, ${modo.accentNeon})`);
            root.style.setProperty('--bg-base', modo.bgBase);
            root.style.setProperty('--bg-secondary', modo.bgBase);
            root.style.setProperty('--bg-card', modo.bgCard);
            root.style.setProperty('--bg-input', modo.bgInput);
            root.style.setProperty('--glass-border', modo.glassBorder);
            root.style.setProperty('--text-primary', modo.textPrimary);
            root.style.setProperty('--text-secondary', modo.textSecondary);
            root.style.setProperty('--hover-bg', modo.hoverBg);
            root.style.setProperty('--success', modo.success);
            root.style.setProperty('--sidebar-bg', modo.sidebar);

            const sidebar = document.getElementById('sidebar');
            sidebar.style.background = modo.sidebar;
            sidebar.style.borderRight = 'none';

            const logo = document.getElementById('sidebarLogo');
            logo.src = tema.logo;
            logo.onerror = function() { this.src = 'CUPOTAX.png'; };

            const titulo = document.getElementById('sidebarTitulo');
            titulo.textContent = tema.nombre;
            titulo.className = 'prestataria';
            titulo.style.background = 'none';
            titulo.style.color = modo.textPrimary;

            document.getElementById('panelSubtitle').textContent = 'Panel exclusivo';

        function actualizarMenuPrestataria(activo) {
            const menu = document.getElementById('sidebarMenu');
            const itemsExistentes = menu.querySelectorAll('.prestataria-item');
            itemsExistentes.forEach(el => el.remove());

            if (activo) {
                const soporteItem = document.querySelector('#menuSoporte')?.closest('li');
                if (soporteItem) soporteItem.style.display = 'none';

                const mensajesItem = document.querySelector('#menuMensajesUsuarios')?.closest('li');
                if (mensajesItem) mensajesItem.style.display = 'none';

                const usuariosItem = document.querySelector('#menuUsuarios')?.closest('li');
                if (usuariosItem) usuariosItem.style.display = 'none';

                const items = [
                    { id: 'menuFlota', icon: 'fa-truck', text: 'Flota', seccion: 'flota' },
                    { id: 'menuTablaVehiculos', icon: 'fa-table', text: 'Tabla Vehículos', seccion: 'tablaVehiculos' },
                    { id: 'menuTemporada', icon: 'fa-calendar-alt', text: 'Temporada', seccion: 'temporada' },
                    { id: 'menuIngresos', icon: 'fa-dollar-sign', text: 'Ingresos', seccion: 'ingresos' },
                    { id: 'menuMensajesConductores', icon: 'fa-comment-dots', text: 'Mensajes Conductores',
                        seccion: 'mensajes_conductores' }
                ];

                const salirItem = menu.querySelector('li:last-child');
                const divider = document.createElement('li');
                divider.className = 'divider prestataria-item';
                menu.insertBefore(divider, salirItem);

                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'prestataria-item';
                    li.innerHTML =
                        `<a href="#" onclick="mostrarSeccion('${item.seccion}'); return false;" id="${item.id}"><i class="fas ${item.icon}"></i><span>${item.text}</span></a>`;
                    menu.insertBefore(li, salirItem);
                });
            } else {
                const soporteItem = document.querySelector('#menuSoporte')?.closest('li');
                if (soporteItem) soporteItem.style.display = 'block';

                const mensajesItem = document.querySelector('#menuMensajesUsuarios')?.closest('li');
                if (mensajesItem) mensajesItem.style.display = 'block';

                const usuariosItem = document.querySelector('#menuUsuarios')?.closest('li');
                if (usuariosItem) usuariosItem.style.display = 'block';
            }
        }

        let mensajeConductorRespondiendo = null;

        function cargarMensajesConductores(prestatariaId) {
            const container = document.getElementById('mensajesConductoresContainer');
            const alertasContainer = document.getElementById('alertasAtaquesConductores');

            const mensajesRef = database.ref('mensajes_conductores/' + prestatariaId);
            mensajesRef.orderByChild('timestamp').once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    container.innerHTML = `
                        <div class="text-center" style="padding:1rem; color:var(--text-tertiary);">
                            <i class="fas fa-inbox" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                            No hay mensajes de conductores
                        </div>
                    `;
                    return;
                }

                // Verificar ataques
                let hayAtaques = false;
                let alertasHtml = '';

                Object.keys(data).forEach(key => {
                    const msg = data[key];
                    if (msg.reportado) {
                        hayAtaques = true;
                        const fecha = new Date(msg.timestamp).toLocaleString();
                        alertasHtml += `
                            <div class="alerta-ataque">
                                <span class="icono">🚨</span>
                                <span class="texto"><strong>${sanitizarTexto(msg.nombre)}</strong> intentó enviar un mensaje malicioso: <strong>${sanitizarTexto(msg.mensaje)}</strong></span>
                                <span class="fecha">${fecha}</span>
                                <button class="btn-danger" onclick="marcarAtaqueLeido('${prestatariaId}','${key}')">Marcar leído</button>
                            </div>
                        `;
                    }
                });

                if (hayAtaques) {
                    alertasContainer.innerHTML = `
                        <div style="margin-bottom:1rem;">
                            <h3 style="font-size:0.85rem; color:var(--danger);"><i class="fas fa-shield-alt"></i> Alertas de seguridad detectadas</h3>
                            ${alertasHtml}
                        </div>
                    `;
                } else {
                    alertasContainer.innerHTML = '';
                }

                // Mostrar mensajes normales
                let mensajesHtml = '';
                const mensajesNormales = Object.keys(data).filter(key => !data[key].reportado);

                if (mensajesNormales.length === 0) {
                    mensajesHtml = `
                        <div class="text-center" style="padding:1rem; color:var(--text-tertiary);">
                            <i class="fas fa-check-circle" style="font-size:2rem; display:block; margin-bottom:0.5rem; color:var(--success);"></i>
                            No hay mensajes pendientes
                        </div>
                    `;
                } else {
                    mensajesNormales.sort((a, b) => data[b].timestamp - data[a].timestamp);
                    mensajesNormales.forEach(key => {
                        const msg = data[key];
                        const fecha = new Date(msg.timestamp).toLocaleString();
                        const estadoClass = msg.leido ? 'leido' : 'no-leido';
                        const estadoText = msg.leido ? '✅ Leído' : '🔴 No leído';
                        const respondidoClass = msg.respondido ? 'respondido' : '';
                        const respondidoText = msg.respondido ? '💬 Respondido' : '';

                        let adjuntosHtml = '';
                        if (msg.adjuntos && msg.adjuntos.length > 0) {
                            adjuntosHtml = '<div class="adjuntos">';
                            msg.adjuntos.forEach(url => {
                                const extension = url.split('.').pop().toLowerCase();
                                const icono = ['jpg', 'jpeg', 'png', 'gif'].includes(extension) ? 'fa-image' :
                                    ['mp4', 'mov', 'avi'].includes(extension) ? 'fa-video' : 'fa-file';
                                adjuntosHtml +=
                                    `<a href="${url}" target="_blank"><i class="fas ${icono}"></i> ${url.split('/').pop()}</a>`;
                            });
                            adjuntosHtml += '</div>';
                        }

                        let respuestaHtml = '';
                        if (msg.respuesta) {
                            respuestaHtml = `
                                <div class="respuesta">
                                    <div class="label">📨 Respuesta del administrador:</div>
                                    ${sanitizarTexto(msg.respuesta)}
                                </div>
                            `;
                        }

                        mensajesHtml += `
                            <div class="mensaje-item" id="msg-conductor-${key}">
                                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:4px;">
                                    <span class="remitente">${sanitizarTexto(msg.nombre)} <span style="font-size:0.6rem; color:var(--text-tertiary); font-weight:400;">(${msg.tipo || 'conductor'})</span></span>
                                    <span style="display:flex; gap:4px; flex-wrap:wrap;">
                                        <span class="estado ${estadoClass}">${estadoText}</span>
                                        ${msg.respondido ? `<span class="estado ${respondidoClass}">${respondidoText}</span>` : ''}
                                        <span class="fecha">${fecha}</span>
                                    </span>
                                </div>
                                <div class="texto">${sanitizarTexto(msg.mensaje)}</div>
                                ${adjuntosHtml}
                                ${respuestaHtml}
                                <div style="margin-top:0.5rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                                    ${!msg.leido ? `<button class="btn-success" onclick="marcarMensajeConductorLeido('${prestatariaId}','${key}')">Marcar como leído</button>` : ''}
                                    ${!msg.respondido ? `<button class="btn-primary" onclick="abrirRespuestaConductor('${key}')">Responder</button>` : ''}
                                    <button class="btn-danger" onclick="eliminarMensajeConductor('${prestatariaId}','${key}')">Eliminar</button>
                                </div>
                            </div>
                        `;
                    });
                }

                container.innerHTML = mensajesHtml;
            }).catch(err => {
                container.innerHTML = `
                    <div class="text-center" style="padding:1rem; color:var(--danger);">
                        <i class="fas fa-exclamation-triangle" style="font-size:2rem; display:block; margin-bottom:0.5rem;"></i>
                        Error al cargar mensajes: ${err.message}
                    </div>
                `;
            });
        }

        function abrirRespuestaConductor(mensajeId) {
            mensajeConductorRespondiendo = mensajeId;
            document.getElementById('responderMensajeConductor').style.display = 'block';
            document.getElementById('respuestaConductorTextarea').value = '';
            document.getElementById('respuestaConductorTextarea').focus();
        }

        function cancelarRespuestaConductor() {
            mensajeConductorRespondiendo = null;
            document.getElementById('responderMensajeConductor').style.display = 'none';
        }

        function enviarRespuestaConductor() {
            const textarea = document.getElementById('respuestaConductorTextarea');
            const respuesta = textarea.value.trim();

            if (!respuesta) {
                Swal.fire({ title: '⚠️ Error', text: 'Escribe una respuesta', icon: 'warning', background: 'var(--bg-card)',
                    color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
                return;
            }

            if (!validarMensaje(respuesta)) {
                Swal.fire({ title: '⚠️ Mensaje inválido', text: 'El mensaje contiene caracteres no permitidos',
                    icon: 'warning', background: 'var(--bg-card)', color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)' });
                return;
            }

            const prestatariaId = prestatariaSeleccionada;
            const mensajeId = mensajeConductorRespondiendo;

            const updates = {};
            updates[`mensajes_conductores/${prestatariaId}/${mensajeId}/respuesta`] = sanitizarTexto(respuesta);
            updates[`mensajes_conductores/${prestatariaId}/${mensajeId}/respondido`] = true;
            updates[`mensajes_conductores/${prestatariaId}/${mensajeId}/leido`] = true;

            database.ref().update(updates).then(() => {
                Swal.fire({ title: '✅ Enviado', text: 'Respuesta enviada al conductor', icon: 'success',
                    background: 'var(--bg-card)', color: 'var(--text-primary)',
                confirmButtonColor: 'var(--accent)' });
                cancelarRespuestaConductor();
                cargarMensajesConductores(prestatariaId);
                registrarAuditoria('responder_conductor', `Respondió mensaje ${mensajeId}`);
            }).catch(err => {
                Swal.fire({ title: '❌ Error', text: err.message, icon: 'error', background: 'var(--bg-card)',
                    color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
            });
        }

        function marcarMensajeConductorLeido(prestatariaId, mensajeId) {
            database.ref(`mensajes_conductores/${prestatariaId}/${mensajeId}/leido`).set(true).then(() => {
                cargarMensajesConductores(prestatariaId);
                registrarAuditoria('marcar_leido_conductor', `Marcó mensaje ${mensajeId} como leído`);
            });
        }

        function marcarAtaqueLeido(prestatariaId, mensajeId) {
            database.ref(`mensajes_conductores/${prestatariaId}/${mensajeId}/leido`).set(true).then(() => {
                cargarMensajesConductores(prestatariaId);
                registrarAuditoria('marcar_ataque_leido', `Marcó ataque ${mensajeId} como leído`);
            });
        }

        function eliminarMensajeConductor(prestatariaId, mensajeId) {
            Swal.fire({
                title: '¿Eliminar mensaje?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar',
                background: 'var(--bg-card)',
                color: 'var(--text-primary)',
                confirmButtonColor: 'var(--danger)'
            }).then(result => {
                if (result.isConfirmed) {
                    database.ref(`mensajes_conductores/${prestatariaId}/${mensajeId}`).remove().then(() => {
                        cargarMensajesConductores(prestatariaId);
                        registrarAuditoria('eliminar_mensaje_conductor', `Eliminó mensaje ${mensajeId}`);
                        Swal.fire({ title: '✅ Eliminado', text: 'Mensaje eliminado', icon: 'success',
                            background: 'var(--bg-card)', color: 'var(--text-primary)',
                            confirmButtonColor: 'var(--accent)', timer: 1500 });
                    });
                }
            });
        }

        function abrirRespuestaUsuario(mensajeId) {
            mensajeUsuarioRespondiendo = mensajeId;
            document.getElementById('responderMensajeUsuario').style.display = 'block';
            document.getElementById('respuestaUsuarioTextarea').value = '';
            document.getElementById('respuestaUsuarioTextarea').focus();
        }

        function cancelarRespuestaUsuario() {
            mensajeUsuarioRespondiendo = null;
            document.getElementById('responderMensajeUsuario').style.display = 'none';
        }

        function enviarRespuestaUsuario() {
            const textarea = document.getElementById('respuestaUsuarioTextarea');
            const respuesta = textarea.value.trim();

            if (!respuesta) {
                Swal.fire({ title: '⚠️ Error', text: 'Escribe una respuesta', icon: 'warning', background: 'var(--bg-card)',
                    color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
                return;
            }

            if (!validarMensaje(respuesta)) {
                Swal.fire({ title: '⚠️ Mensaje inválido', text: 'El mensaje contiene caracteres no permitidos',
                    icon: 'warning', background: 'var(--bg-card)', color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)' });
                return;
            }

            const mensajeId = mensajeUsuarioRespondiendo;

            const updates = {};
            updates[`mensajes_usuarios/${mensajeId}/respuesta`] = sanitizarTexto(respuesta);
            updates[`mensajes_usuarios/${mensajeId}/respondido`] = true;
            updates[`mensajes_usuarios/${mensajeId}/leido`] = true;

            database.ref().update(updates).then(() => {
                Swal.fire({ title: '✅ Enviado', text: 'Respuesta enviada al usuario', icon: 'success',
                    background: 'var(--bg-card)', color: 'var(--text-primary)',
                confirmButtonColor: 'var(--accent)' });
                cancelarRespuestaUsuario();
                cargarMensajesUsuarios();
                registrarAuditoria('responder_usuario', `Respondió mensaje ${mensajeId}`);
            }).catch(err => {
                Swal.fire({ title: '❌ Error', text: err.message, icon: 'error', background: 'var(--bg-card)',
                    color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
            });
        }

        let listaUsuariosCompleta = [];

        function cargarUsuarios() {
            const tbody = document.getElementById('cuerpoTablaUsuarios');

            database.ref('users').once('value').then(snapshot => {
                const data = snapshot.val();
                if (!data) {
                    tbody.innerHTML =
                        `<tr><td colspan="7" class="text-center" style="padding:1.5rem; color:var(--text-tertiary);">No hay usuarios registrados</td></tr>`;
                    return;
                }

                listaUsuariosCompleta = [];
                let total = 0,
                    usuarios = 0,
                    taxistas = 0,
                    buseros = 0;

                Object.keys(data).forEach(uid => {
                    const user = data[uid];
                    total++;
                    if (user.rol === 'usuario') usuarios++;
                    else if (user.rol === 'taxista') taxistas++;
                    else if (user.rol === 'busero') buseros++;

                    listaUsuariosCompleta.push({
                        uid: uid,
                        nombre: user.nombre || 'Sin nombre',
                        usuario: user.usuario || user.email || 'Sin usuario',
                        cedula: user.cedula || 'N/A',
                        rol: user.rol || 'usuario',
                        prestataria: user.prestataria || 'N/A',
                        fecha_registro: user.fecha_registro || 'N/A',
                        email: user.email || 'N/A'
                    });
                });

                document.getElementById('totalUsuarios').textContent = total;
                document.getElementById('totalUsuariosNormales').textContent = usuarios;
                document.getElementById('totalTaxistas').textContent = taxistas;
                document.getElementById('totalBuseros').textContent = buseros;

                renderizarTablaUsuarios(listaUsuariosCompleta);
                registrarAuditoria('ver_usuarios', 'Vio lista de usuarios registrados');
            }).catch(err => {
                tbody.innerHTML =
                    `<tr><td colspan="7" class="text-center" style="padding:1.5rem; color:var(--danger);">Error al cargar usuarios: ${err.message}</td></tr>`;
            });
        }

        function renderizarTablaUsuarios(data) {
            const tbody = document.getElementById('cuerpoTablaUsuarios');
            if (!data || data.length === 0) {
                tbody.innerHTML =
                    `<tr><td colspan="7" class="text-center" style="padding:1.5rem; color:var(--text-tertiary);">No hay usuarios que coincidan con la búsqueda</td></tr>`;
                return;
            }

            let html = '';
            data.forEach(user => {
                const rolIcon = user.rol === 'usuario' ? 'fa-user' :
                    user.rol === 'taxista' ? 'fa-taxi' :
                    user.rol === 'busero' ? 'fa-bus' :
                    user.rol === 'admin' ? 'fa-user-shield' : 'fa-user';
                const rolColor = user.rol === 'usuario' ? 'var(--info)' :
                    user.rol === 'taxista' ? 'var(--warning)' :
                    user.rol === 'busero' ? 'var(--success)' :
                    user.rol === 'admin' ? 'var(--danger)' : 'var(--text-secondary)';
                const fecha = user.fecha_registro !== 'N/A' ? new Date(user.fecha_registro).toLocaleDateString() : 'N/A';

                html += `
                    <tr>
                        <td><strong>${sanitizarTexto(user.nombre)}</strong></td>
                        <td>${sanitizarTexto(user.usuario)}</td>
                        <td>${sanitizarTexto(user.cedula)}</td>
                        <td><span style="color:${rolColor};"><i class="fas ${rolIcon}"></i> ${user.rol.charAt(0).toUpperCase() + user.rol.slice(1)}</span></td>
                        <td>${user.prestataria !== 'N/A' ? sanitizarTexto(user.prestataria) : '—'}</td>
                        <td>${fecha}</td>
                        <td>
                            <button class="btn-outline" style="padding:2px 10px; font-size:0.6rem;" onclick="verDetalleUsuario('${user.uid}')">Ver</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        function filtrarUsuarios() {
            const busqueda = document.getElementById('buscarUsuario').value.toLowerCase().trim();
            const rolFiltro = document.getElementById('filtroRolUsuario').value;

            let filtrados = listaUsuariosCompleta;

            if (busqueda) {
                filtrados = filtrados.filter(u =>
                    u.nombre.toLowerCase().includes(busqueda) ||
                    u.usuario.toLowerCase().includes(busqueda) ||
                    u.cedula.includes(busqueda)
                );
            }

            if (rolFiltro) {
                filtrados = filtrados.filter(u => u.rol === rolFiltro);
            }

            renderizarTablaUsuarios(filtrados);
        }

        function verDetalleUsuario(uid) {
            const user = listaUsuariosCompleta.find(u => u.uid === uid);
            if (!user) {
                Swal.fire({ title: 'Error', text: 'Usuario no encontrado', icon: 'error', background: 'var(--bg-card)',
                    color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
                return;
            }

            const html = `
                <div style="text-align:left;">
                    <p><strong>Nombre:</strong> ${sanitizarTexto(user.nombre)}</p>
                    <p><strong>Usuario:</strong> ${sanitizarTexto(user.usuario)}</p>

                    <p><strong>Email:</strong> ${sanitizarTexto(user.email)}</p>

        function exportarUsuariosExcel() {
            if (listaUsuariosCompleta.length === 0) {
                Swal.fire({ title: '⚠️ Sin datos', text: 'No hay usuarios para exportar', icon: 'warning',
                    background: 'var(--bg-card)', color: 'var(--text-primary)',
                confirmButtonColor: 'var(--accent)' });
                return;
            }

            const data = listaUsuariosCompleta.map(u => ({
                Nombre: u.nombre,
                Usuario: u.usuario,
                Cédula: u.cedula,
                Rol: u.rol,
                Prestataria: u.prestataria,
                'Fecha Registro': u.fecha_registro,
                Email: u.email
            }));

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(data), 'Usuarios');
            XLSX.writeFile(wb, `usuarios_${new Date().toISOString().slice(0,10)}.xlsx`);

            registrarAuditoria('exportar_usuarios_excel', 'Exportó lista de usuarios a Excel');
            Swal.fire({ title: '✅ Exportado', text: 'Usuarios exportados a Excel', icon: 'success',
                background: 'var(--bg-card)', color: 'var(--text-primary)', confirmButtonColor: 'var(--accent)' });
        }

        function sanitizarTexto(texto) {
            if (!texto) return '';
            return texto
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;')
                .replace(/\//g, '&#047;');
        }

        function validarMensaje(texto) {
            if (!texto || texto.trim().length === 0) return false;
            if (texto.length > 500) return false;
            const permitidos = /^[a-zA-Z0-9áéíóúÁÉÍÓÚñÑ\s.,!?¿¡()\-:;'"\n]+$/;
            return permitidos.test(texto.trim());
        }

        function detectarAtaque(texto) {
            const patronesMaliciosos = [
                /<script/i,
                /<\/script>/i,
                /onerror\s*=/i,
                /onload\s*=/i,
                /onclick\s*=/i,
                /eval\s*\(/i,
                /document\.cookie/i,
                /alert\s*\(/i,
                /prompt\s*\(/i,
                /confirm\s*\(/i,
                /fetch\s*\(/i,
                /xmlhttprequest/i,
                /\.exe/i,
                /\.bat/i,
                /\.sh/i,
                /\.cmd/i
            ];

            for (const patron of patronesMaliciosos) {
                if (patron.test(texto)) {
                    return true;
                }
            }
            return false;
        }

        function detectarArchivoPeligroso(nombreArchivo) {
            const extensionesPeligrosas = ['.exe', '.bat', '.cmd', '.sh', '.dmg', '.app', '.msi', '.scr', '.jar'];
            const nombreLower = nombreArchivo.toLowerCase();
            for (const ext of extensionesPeligrosas) {
                if (nombreLower.endsWith(ext)) {
                    return true;
                }
            }
            return false;
        }

        function validarExtensionArchivo(nombreArchivo) {
            const extensionesPermitidas = ['.jpg', '.jpeg', '.png', '.gif', '.mp4', '.mov', '.avi', '.pdf', '.doc', '.docx'];
            const nombreLower = nombreArchivo.toLowerCase();
            for (const ext of extensionesPermitidas) {
                if (nombreLower.endsWith(ext)) {
                    return true;
                }
            }
            return false;
        }

                    registrarAuditoria('login', 'Inicio de sesión desde panel admin');

            });

        let temporizadorInactividad = null;

        let inactividadActiva = false;

        function iniciarControlInactividad() {
            const eventos = ['click', 'mousemove', 'keydown', 'scroll', 'touchstart', 'touchmove'];
            eventos.forEach(evento => {
                document.addEventListener(evento, resetearInactividad);
            });

            temporizadorInactividad = setTimeout(() => {
                mostrarOverlayInactividad();
            }, 1800000);
        }

        function resetearInactividad() {
            if (inactividadActiva) return;

            clearTimeout(temporizadorInactividad);
            temporizadorInactividad = setTimeout(() => {
                mostrarOverlayInactividad();
            }, 1800000);
        }

        function mostrarOverlayInactividad() {
            inactividadActiva = true;
            contadorInactividad = 10;
            const overlay = document.getElementById('inactividadOverlay');
            const countdown = document.getElementById('countdownTimer');

            if (overlay && countdown) {
                overlay.classList.add('active');
                countdown.textContent = contadorInactividad;

                const intervalo = setInterval(() => {
                    contadorInactividad--;
                    countdown.textContent = contadorInactividad;

                    if (contadorInactividad <= 0) {
                        clearInterval(intervalo);
                        cerrarSesionForzada();
                    }
                }, 1000);
            }
        }

        function reiniciarInactividad() {
            inactividadActiva = false;
            const overlay = document.getElementById('inactividadOverlay');
            if (overlay) overlay.classList.remove('active');

            clearTimeout(temporizadorInactividad);
            temporizadorInactividad = setTimeout(() => {
                mostrarOverlayInactividad();
            }, 1800000);

            registrarAuditoria('reiniciar_inactividad', 'Sesión reactivada por usuario');
        }

        function cerrarSesionForzada() {
            const overlay = document.getElementById('inactividadOverlay');
            if (overlay) overlay.classList.remove('active');
            inactividadActiva = false;

            registrarAuditoria('cierre_inactividad', 'Sesión cerrada por inactividad');

            auth.signOut().then(() => {
                Swal.fire({
                    title: '⏰ Sesión cerrada',
                    text: 'Tu sesión se cerró por inactividad.',
                    icon: 'info',
                    timer: 1500,
                    showConfirmButton: false,
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)'
                }).then(() => {
                    window.location.href = '/login.html';
                });
            });
        }

        function cerrarSesion() {
            registrarAuditoria('logout', 'Cierre de sesión manual');

            auth.signOut().then(() => {
                window.location.href = '/login.html';
            });
        }

        // ============================================================
        // 🧭 NAVEGACIÓN
        // ============================================================
        function mostrarSeccion(seccion) {
            if (modoPrestataria && !['dashboard', 'flota', 'tablaVehiculos', 'temporada', 'ingresos', 'asociados',
                    'mensajes_conductores'
                ].includes(seccion)) {
                Swal.fire({
                    title: '⚠️ Acceso Restringido',
                    text: 'En modo prestataria solo puedes acceder a: Dashboard, Flota, Tabla Vehículos, Temporada, Ingresos, Asociados y Mensajes Conductores.',
                    icon: 'info',
                    background: 'var(--bg-card)',
                    color: 'var(--text-primary)',
                    confirmButtonColor: 'var(--accent)'
                });
                return;
            }

            document.querySelectorAll('.sidebar-menu a').forEach(a => a.classList.remove('active'));
            const menuMap = {
                'dashboard': 'menuDashboard',
                'asociados': 'menuAsociados',
                'reportes': 'menuReportes',
                'soporte': 'menuSoporte',
                'mensajes_usuarios': 'menuMensajesUsuarios',
                'usuarios': 'menuUsuarios',
                'flota': 'menuFlota',
                'tablaVehiculos': 'menuTablaVehiculos',
                'temporada': 'menuTemporada',
                'ingresos': 'menuIngresos',
                'mensajes_conductores': 'menuMensajesConductores'
            };
            const el = document.getElementById(menuMap[seccion]);
            if (el) el.classList.add('active');

            switch (seccion) {
                case 'dashboard':
                    mostrarDashboard();
                    break;
                case 'asociados':
                    mostrarAsociados();
                    break;
                case 'reportes':
                    mostrarReportes();
                    break;
                case 'soporte':
                    mostrarSoporte();
                    break;
                case 'mensajes_usuarios':
                    mostrarMensajesUsuarios();
                    break;
                case 'usuarios':
                    mostrarUsuarios();
                    break;
                case 'flota':
                    mostrarFlota();
                    break;
                case 'tablaVehiculos':
                    mostrarTablaVehiculos();
                    break;
                case 'temporada':
                    mostrarTemporada();
                    break;
                case 'ingresos':
                    mostrarIngresos();
                    break;
                case 'mensajes_conductores':
                    mostrarMensajesConductores();
                    break;
                default:
                    document.getElementById('contenidoPrincipal').innerHTML = `
                        <div class="section text-center" style="padding:2rem;">
                            <i class="fas fa-construction" style="font-size:2.5rem; color:var(--accent);"></i>
                            <h2 style="margin-top:1rem;">Sección en construcción</h2>
                            <p style="color:var(--text-secondary);">Estamos trabajando en esta funcionalidad</p>
                        </div>
                    `;
            }

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function cerrarModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // ============================================================
        // 🚀 INICIALIZACIÓN
        // ============================================================
        window.addEventListener('DOMContentLoaded', function() {
            verificarAutenticacion();

            const theme = localStorage.getItem('cupotax-theme');
            if (theme === 'light') {
                document.body.classList.remove('dark-mode');
                document.body.classList.add('light-mode');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
                modoOscuro = false;
            }

            console.log('🚀 CupoTax - Panel Administrador');
            console.log('📋 Prestatarias: ', Object.keys(asociadosPorPrestataria).length);
            console.log('👥 Total asociados: ', Object.values(asociadosPorPrestataria).reduce((sum, p) => sum + p
                .asociados.length, 0));
            console.log('🛡️ Seguridad activa: Autenticación, Auditoría, Inactividad (30min), Sanitización, Anti-XSS');
            console.log('📨 Mensajería: Conductores → Admin Prestataria | Usuarios → Superadmin');
            console.log('👥 Usuarios: Lista completa con filtros y exportación');
        });

        window.onclick = function(e) {
            const modal = document.getElementById('detailModal');
            if (modal && modal.classList.contains('active') && e.target === modal) {
                modal.classList.remove('active');
            }
        };
    </script>

</body>
