spring.application.name=CupoTax

# PUERTO PARA RENDER (usar variable de entorno)
server.port=${PORT:8080}

# THYMELEAF CONFIGURATION
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========== BASE DE DATOS H2 CON PERSISTENCIA EN ARCHIVO ==========
spring.datasource.url=jdbc:h2:file:./data/cupotaxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# CONSOLA H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# SEGURIDAD
server.servlet.session.timeout=30m

# TAMA\u00d1O DE ARCHIVOS
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT
jwt.secret=CupoTaxSuperSecretKey2026ParaMultiServiciosSeguridadTotal12345
jwt.expiration=86400000

# CORS
cors.allowed.origins=https://cupotax.onrender.com,http://localhost:8080