spring.application.name=CupoTax

server.port=8080

# THYMELEAF CONFIGURATION
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========== BASE DE DATOS H2 CON PERSISTENCIA EN ARCHIVO ==========
# Los datos se guardan en un archivo .mv.db dentro del proyecto
# As\u00ed NO se pierden al reiniciar la aplicaci\u00f3n
spring.datasource.url=jdbc:h2:file:./data/cupotaxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# CONSOLA H2 (para ver la base de datos desde el navegador)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========== SEGURIDAD ADICIONAL ==========
# Tiempo de expiraci\u00f3n de sesi\u00f3n (30 minutos)
server.servlet.session.timeout=30m

# Tama\u00f1o m\u00e1ximo de archivos subidos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========== JWT CONFIGURATION ==========
jwt.secret=CupoTaxSuperSecretKey2026ParaMultiServiciosSeguridadTotal12345
jwt.expiration=86400000

# ========== CORS CONFIGURATION ==========
cors.allowed.origins=https://cupotax.onrender.com,http://localhost:8080